<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión / Registrarse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html">🅿️ Parqueos</a>
    </div>
  </nav>

  <div class="page-container">
    <div class="text-center mb-4" style="margin-top:1rem;">
      <div style="font-size:3rem;">🅿️</div>
      <h2 class="fw-bold" style="color:var(--primary);">Bienvenido</h2>
      <p class="text-muted">Inicia sesión o crea una cuenta para continuar</p>
    </div>

    <div class="card-parqueo p-3 mb-4">
      <h5 class="fw-bold mb-3">🔑 Iniciar sesión</h5>
      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label fw-semibold">Correo electrónico</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="tu@correo.com" required>
        </div>
        <button type="submit" class="btn-main">Entrar</button>
      </form>
    </div>

    <div class="divider"><span>o regístrate</span></div>

    <div class="card-parqueo p-3 mb-3">
      <h5 class="fw-bold mb-3">📝 Crear cuenta</h5>
      <form id="formRegister">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nombre</label>
          <input type="text" class="form-control" id="regNombre" placeholder="Tu nombre" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Correo electrónico</label>
          <input type="email" class="form-control" id="regEmail" placeholder="tu@correo.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Rol</label>
          <select class="form-select" id="regRol" required>
            <option value="visitante">🧳 Visitante</option>
            <option value="anfitrion">🏠 Anfitrión</option>
          </select>
        </div>
        <button type="submit" class="btn-accent">Registrarse</button>
      </form>
    </div>

    <div id="estadoLogin" class="mt-3"></div>
  </div>

  <script src="app.js"></script>
  <script>
    if (getUser()) window.location.href = 'index.html';

    document.getElementById('formLogin').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          setUser(resp.user);
          window.location.href = 'index.html';
        } else {
          document.getElementById('estadoLogin').innerHTML = `<div class='alert alert-danger alert-parqueo'>Usuario no encontrado</div>`;
        }
      });
    });
    document.getElementById('formRegister').addEventListener('submit', function(e) {
      e.preventDefault();
      const nombre = document.getElementById('regNombre').value;
      const email = document.getElementById('regEmail').value;
      const rol = document.getElementById('regRol').value;
      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, rol })
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          setUser(resp.user);
          window.location.href = 'index.html';
        } else {
          document.getElementById('estadoLogin').innerHTML = `<div class='alert alert-danger alert-parqueo'>Error al registrar</div>`;
        }
      });
    });
  </script>
</body>
</html>
