<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceder — RDP S.A.</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0F172A">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <div class="navbar-brand-logo">R</div>
        RDP S.A.
      </a>
    </div>
  </nav>

  <div class="page-container">
    <!-- Logo y bienvenida -->
    <div class="text-center" style="padding:2rem 0 1.5rem;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#0F172A,#1E293B);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;box-shadow:0 4px 16px rgba(15,23,42,0.2);">
        <i class="bi bi-p-circle-fill" style="font-size:2rem;color:#D4AF37;"></i>
      </div>
      <h2 class="fw-800" style="color:var(--rdp-navy);">Bienvenido a RDP S.A.</h2>
      <p class="text-muted" style="font-size:0.9rem;">Inicia sesión o crea tu cuenta</p>
    </div>

    <!-- Google OAuth -->
    <button id="btnGoogle" onclick="loginConGoogle()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:0.75rem;border:2px solid var(--border);border-radius:12px;background:#fff;font-weight:600;font-size:0.95rem;cursor:pointer;margin-bottom:1rem;transition:box-shadow 0.2s;" onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.12)'" onmouseout="this.style.boxShadow='none'">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continuar con Google
    </button>

    <div class="divider"><span>o con correo</span></div>

    <!-- Formulario: Iniciar sesión -->
    <div class="card-parqueo p-3 mb-3">
      <h5 class="fw-bold mb-3" style="color:var(--rdp-navy);"><i class="bi bi-key-fill icon-inline" style="color:var(--rdp-gold);"></i>Iniciar sesión</h5>
      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••" required autocomplete="current-password" minlength="6">
        </div>
        <button type="submit" class="btn-gold" id="btnLogin">Entrar</button>
      </form>
    </div>

    <div class="divider"><span>o crea una cuenta</span></div>

    <!-- Formulario: Registro -->
    <div class="card-parqueo p-3 mb-3">
      <h5 class="fw-bold mb-3" style="color:var(--rdp-navy);"><i class="bi bi-person-plus-fill icon-inline" style="color:var(--rdp-gold);"></i>Crear cuenta</h5>
      <form id="formRegister">
        <div class="mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="regNombre" placeholder="Tu nombre" required autocomplete="name">
        </div>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="regEmail" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label">Tipo de cuenta</label>
          <select class="form-select" id="regRol" required>
            <option value="visitante">Visitante — busco parqueo</option>
            <option value="anfitrion">Anfitrión — ofrezco parqueo</option>
          </select>
        </div>
        <button type="submit" class="btn-main" id="btnRegister">Crear cuenta</button>
        <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;margin-top:0.75rem;line-height:1.5;">
          Al crear tu cuenta aceptas nuestros
          <a href="terminos.html" target="_blank" style="color:var(--rdp-navy);font-weight:600;">Términos de Uso</a>
          y nuestra
          <a href="privacidad.html" target="_blank" style="color:var(--rdp-navy);font-weight:600;">Política de Privacidad</a>.
        </p>
      </form>
    </div>

    <div id="estadoLogin" class="mt-3"></div>
  </div>

  <script src="lib/supabase-client.js"></script>
  <script src="app.js"></script>
  <script>
    // Manejar callback OAuth de Supabase (redirect desde Google)
    async function handleOAuthCallback() {
      if (!window.rdpSupabase?.isConfigured) return;
      // Supabase v2 devuelve tokens en el hash después de OAuth
      const hash = window.location.hash;
      if (!hash.includes('access_token')) return;
      // Esperar a que Supabase procese el hash
      await new Promise(r => setTimeout(r, 300));
      const session = await window.rdpSupabase.getSession();
      if (!session || !session.user) return;
      setUser(
        {
          id: session.user.id,
          nombre: session.user.user_metadata?.full_name || session.user.email,
          rol: 'visitante',
          email: session.user.email
        },
        session.access_token
      );
      window.location.href = 'index.html';
    }

    async function loginConGoogle() {
      document.getElementById('btnGoogle').disabled = true;
      document.getElementById('btnGoogle').style.opacity = '0.7';
      if (!window.rdpSupabase?.isConfigured) {
        showError('Supabase no está configurado para OAuth.');
        return;
      }
      const { error } = await window.rdpSupabase.signInWithGoogle();
      if (error) {
        showError('Error al conectar con Google: ' + error.message);
        document.getElementById('btnGoogle').disabled = false;
        document.getElementById('btnGoogle').style.opacity = '1';
      }
      // Si no hay error, Supabase redirige a Google — el usuario vuelve a index.html
    }

    if (getUser()) window.location.href = 'index.html';
    else handleOAuthCallback();

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.7' : '1';
    }

    function showError(msg) {
      document.getElementById('estadoLogin').innerHTML =
        `<div class="alert-rdp-error"><i class="bi bi-exclamation-triangle-fill"></i> ${msg}</div>`;
    }
    function showSuccess(msg) {
      document.getElementById('estadoLogin').innerHTML =
        `<div class="alert-rdp-success"><i class="bi bi-check-circle-fill"></i> ${msg}</div>`;
    }

    document.getElementById('formLogin').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      setLoading('btnLogin', true);
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          setUser(resp.user, resp.token);
          window.location.href = 'index.html';
        } else {
          showError(resp.message || 'Credenciales incorrectas');
          setLoading('btnLogin', false);
        }
      })
      .catch(() => { showError('Error de conexión. Intenta de nuevo.'); setLoading('btnLogin', false); });
    });

    document.getElementById('formRegister').addEventListener('submit', function(e) {
      e.preventDefault();
      const nombre = document.getElementById('regNombre').value.trim();
      const email  = document.getElementById('regEmail').value.trim();
      const rol    = document.getElementById('regRol').value;
      setLoading('btnRegister', true);
      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, rol })
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          setUser(resp.user, resp.token);
          window.location.href = 'index.html';
        } else {
          showError(resp.message || 'Error al registrar. El correo puede estar en uso.');
          setLoading('btnRegister', false);
        }
      })
      .catch(() => { showError('Error de conexión. Intenta de nuevo.'); setLoading('btnRegister', false); });
    });
  </script>
</body>
</html>
