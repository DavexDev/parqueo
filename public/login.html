<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceder — RDP S.A.</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#0F172A">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <div class="navbar-brand-logo">R</div>
        RDP S.A.
      </a>
    </div>
  </nav>

  <div class="page-container">
    <!-- Logo y bienvenida -->
    <div class="text-center" style="padding:2rem 0 1.5rem;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#0F172A,#1E293B);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;box-shadow:0 4px 16px rgba(15,23,42,0.2);">
        <i class="bi bi-p-circle-fill" style="font-size:2rem;color:#D4AF37;"></i>
      </div>
      <h2 class="fw-800" style="color:var(--rdp-navy);">Bienvenido a RDP S.A.</h2>
      <p class="text-muted" style="font-size:0.9rem;">Inicia sesión o crea tu cuenta</p>
    </div>

    <!-- Formulario: Iniciar sesión -->
    <div class="card-parqueo p-3 mb-3">
      <h5 class="fw-bold mb-3" style="color:var(--rdp-navy);"><i class="bi bi-key-fill icon-inline" style="color:var(--rdp-gold);"></i>Iniciar sesión</h5>
      <form id="formLogin">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••" required autocomplete="current-password" minlength="6">
        </div>
        <button type="submit" class="btn-gold" id="btnLogin">Entrar</button>
      </form>
    </div>

    <div class="divider"><span>o crea una cuenta</span></div>

    <!-- Formulario: Registro -->
    <div class="card-parqueo p-3 mb-3">
      <h5 class="fw-bold mb-3" style="color:var(--rdp-navy);"><i class="bi bi-person-plus-fill icon-inline" style="color:var(--rdp-gold);"></i>Crear cuenta</h5>
      <form id="formRegister">
        <div class="mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="regNombre" placeholder="Tu nombre" required autocomplete="name">
        </div>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="regEmail" placeholder="tu@correo.com" required autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label">Tipo de cuenta</label>
          <select class="form-select" id="regRol" required>
            <option value="visitante">Visitante — busco parqueo</option>
            <option value="anfitrion">Anfitrión — ofrezco parqueo</option>
          </select>
        </div>
        <button type="submit" class="btn-main" id="btnRegister">Crear cuenta</button>
      </form>
    </div>

    <div id="estadoLogin" class="mt-3"></div>
  </div>

  <script src="app.js"></script>
  <script>
    if (getUser()) window.location.href = 'index.html';

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.7' : '1';
    }

    function showError(msg) {
      document.getElementById('estadoLogin').innerHTML =
        `<div class="alert-rdp-error"><i class="bi bi-exclamation-triangle-fill"></i> ${msg}</div>`;
    }
    function showSuccess(msg) {
      document.getElementById('estadoLogin').innerHTML =
        `<div class="alert-rdp-success"><i class="bi bi-check-circle-fill"></i> ${msg}</div>`;
    }

    document.getElementById('formLogin').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      setLoading('btnLogin', true);
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          setUser(resp.user, resp.token);
          window.location.href = 'index.html';
        } else {
          showError(resp.message || 'Credenciales incorrectas');
          setLoading('btnLogin', false);
        }
      })
      .catch(() => { showError('Error de conexión. Intenta de nuevo.'); setLoading('btnLogin', false); });
    });

    document.getElementById('formRegister').addEventListener('submit', function(e) {
      e.preventDefault();
      const nombre = document.getElementById('regNombre').value.trim();
      const email  = document.getElementById('regEmail').value.trim();
      const rol    = document.getElementById('regRol').value;
      setLoading('btnRegister', true);
      fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, email, rol })
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          setUser(resp.user, resp.token);
          window.location.href = 'index.html';
        } else {
          showError(resp.message || 'Error al registrar. El correo puede estar en uso.');
          setLoading('btnRegister', false);
        }
      })
      .catch(() => { showError('Error de conexión. Intenta de nuevo.'); setLoading('btnRegister', false); });
    });
  </script>
</body>
</html>
