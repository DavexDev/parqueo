<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Parqueos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    #map { height: 400px; border-radius: 14px; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .map-toggle { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html"><i class="bi bi-p-circle-fill icon-inline"></i>Parqueos</a>
    </div>
  </nav>

  <div class="page-container">
    <h2 class="section-title"><i class="bi bi-search icon-inline"></i>Parqueos disponibles</h2>
    
    <div class="map-toggle">
      <button id="btnMapa" class="btn-ghost" style="width:100%;"><i class="bi bi-map icon-inline"></i>Ver en mapa</button>
    </div>

    <div id="map" style="display:none;"></div>

    <form id="filtros" class="mb-3">
      <div class="d-flex gap-2 flex-wrap">
        <select class="form-select" id="tipoFiltro" style="flex:1;min-width:100px;">
          <option value="">Tipo</option>
          <option value="auto">Auto</option>
          <option value="moto">Moto</option>
        </select>
        <input type="number" class="form-control" id="precioFiltro" placeholder="Precio máx." style="flex:1;min-width:100px;">
        <input type="number" class="form-control" id="radioFiltro" placeholder="Radio (km)" min="1" max="50" style="flex:1;min-width:100px;">
        <button type="submit" class="btn-main" style="min-width:80px;padding:0.5rem;">Filtrar</button>
      </div>
    </form>
    <div id="listaParqueos"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="app.js"></script>
  <script>
    let map = null;
    let userLocation = null;
    let allParkings = [];

    document.addEventListener('DOMContentLoaded', () => { 
      renderNavbar(); 
      renderBottomBar('parkings'); 
      cargarParqueos();
      
      document.getElementById('btnMapa').addEventListener('click', toggleMap);
      document.getElementById('filtros').addEventListener('submit', (e) => { e.preventDefault(); cargarParqueos(); });
      
      // Detectar ubicación del usuario
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          console.log('Ubicación detectada:', userLocation);
        }, err => console.log('Geolocalización denegada', err));
      }
    });

    function toggleMap() {
      const mapDiv = document.getElementById('map');
      const btn = document.getElementById('btnMapa');
      
      if (mapDiv.style.display === 'none') {
        mapDiv.style.display = 'block';
        btn.innerHTML = '<i class="bi bi-list-check icon-inline"></i>Ver lista';
        initMap();
      } else {
        mapDiv.style.display = 'none';
        btn.innerHTML = '<i class="bi bi-map icon-inline"></i>Ver en mapa';
      }
    }

    function initMap() {
      if (map) return;
      
      const center = userLocation || { lat: 14.566, lng: -89.355 };
      map = L.map('map').setView([center.lat, center.lng], 13);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 19
      }).addTo(map);

      // Marcador de usuario
      if (userLocation) {
        L.circleMarker([userLocation.lat, userLocation.lng], {
          radius: 8,
          fillColor: '#1565c0',
          color: '#fff',
          weight: 3,
          opacity: 1,
          fillOpacity: 0.8
        }).addTo(map).bindPopup('Tu ubicación');
      }

      // Marcadores de parqueos
      allParkings.forEach(p => {
        if (p.lat && p.lng) {
          const icon = p.tipo === 'moto' ? '🏍️' : '🚗';
          L.marker([p.lat, p.lng]).addTo(map)
            .bindPopup(`<b>${p.nombre}</b><br>Q${p.precio}<br><a href="reserve.html?id=${p.id}">Reservar</a>`);
        }
      });

      setTimeout(() => map.invalidateSize(), 100);
    }

    function cargarParqueos() {
      const tipo = document.getElementById('tipoFiltro').value;
      const precio = document.getElementById('precioFiltro').value;
      const radio = document.getElementById('radioFiltro').value;

      let url = '/api/parkings';
      
      // Si hay ubicación del usuario y radio, usar búsqueda por proximidad
      if (userLocation && radio) {
        url = `/api/parkings/near?lat=${userLocation.lat}&lng=${userLocation.lng}&radius=${radio}`;
      }

      fetch(url)
        .then(r => r.json())
        .then(data => {
          allParkings = data;
          let parqueos = [...data];
          
          if (tipo) parqueos = parqueos.filter(p => p.tipo === tipo);
          if (precio) parqueos = parqueos.filter(p => p.precio <= precio);
          
          const cont = document.getElementById('listaParqueos');
          cont.innerHTML = '';
          
          if (parqueos.length === 0) {
            cont.innerHTML = '<div class="text-center text-muted py-5">No hay parqueos disponibles</div>';
            return;
          }
          
          parqueos.forEach(p => {
            const icon = p.tipo === 'moto' ? 'bi-bicycle' : 'bi-car-front-fill';
            const distancia = p.distance ? `<small class="text-muted">${p.distance.toFixed(1)} km</small>` : '';
            
            cont.innerHTML += `
              <div class="parking-card">
                <div class="parking-card-header">
                  <div class="parking-icon"><i class="bi ${icon}"></i></div>
                  <div class="parking-info">
                    <h6>${p.nombre}</h6>
                    <small>${p.direccion}</small>
                    ${distancia}
                  </div>
                </div>
                <div class="parking-badges">
                  <span class="badge-tipo">${p.tipo}</span>
                  <span class="badge-precio">Q${p.precio}</span>
                  ${p.disponible ? '<span class="parking-availability"><i class="bi bi-check-circle-fill"></i>Disponible</span>' : ''}
                </div>
                <div class="parking-card-footer">
                  <span></span>
                  <a href="reserve.html?id=${p.id}" class="text-primary" style="text-decoration:none;">Reservar →</a>
                </div>
              </div>
            `;
          });

          // Actualizar mapa si está visible
          if (map && document.getElementById('map').style.display !== 'none') {
            initMap();
          }
        });
    }
  </script>
</body>
</html>
