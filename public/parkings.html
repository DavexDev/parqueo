--><!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noai, noimageai, noarchive">
  <meta name="copyright" content="© 2026 DavexDev — Todos los derechos reservados">
  <meta name="license" content="Proprietary — All Rights Reserved">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Parqueos — RDP S.A.</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    #map { height: 380px; border-radius: 14px; margin-bottom: 1.5rem; box-shadow: var(--shadow-lg); }
    .parking-foto-placeholder { width:100%; height:140px; background:linear-gradient(135deg,var(--rdp-navy),var(--rdp-navy-80,#1e3a5f)); border-radius:12px 12px 0 0; display:flex; align-items:center; justify-content:center; }
    .tipo-chip { display:inline-block; padding:2px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; background:rgba(15,23,42,.08); color:var(--rdp-navy); margin-right:4px; margin-bottom:4px; }
    .price-row { display:flex; gap:1rem; align-items:center; }
    .price-item { display:flex; flex-direction:column; }
    .price-label { font-size:0.7rem; color:#6b7280; text-transform:uppercase; letter-spacing:.04em; }
    .price-val { font-size:1.05rem; font-weight:700; color:var(--rdp-navy); }
    .stars { color:#F59E0B; }
    .filtro-chip { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; border:1.5px solid #e5e7eb; background:#fff; font-size:0.82rem; font-weight:500; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .filtro-chip.active { background:var(--rdp-navy); color:#fff; border-color:var(--rdp-navy); }
    .filtros-scroll { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
    .filtros-scroll::-webkit-scrollbar { display:none; }
    .map-popup-actions { display:flex; gap:6px; margin-top:8px; }
    .map-popup-actions a { flex:1; text-align:center; padding:4px 8px; border-radius:8px; text-decoration:none; font-size:0.78rem; font-weight:600; }
    .map-popup-btn-reservar { background:#0F172A; color:#D4AF37; }
    .map-popup-btn-ruta     { background:#f3f4f6; color:#374151; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html"><div class="navbar-brand-logo">R</div>RDP S.A.</a>
      <span id="navUser"></span>
    </div>
  </nav>

  <div class="page-container">
    <h2 class="section-title"><i class="bi bi-search icon-inline"></i>Parqueos disponibles</h2>

    <!-- Buscador -->
    <div class="mb-3">
      <div class="input-group">
        <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
        <input type="text" class="form-control" id="busqueda" placeholder="Buscar por nombre o dirección...">
        <button class="btn-main" style="border-radius:0 10px 10px 0;padding:.5rem 1rem;" onclick="cargarParqueos()">Buscar</button>
      </div>
    </div>

    <!-- Filtros tipo vehículo -->
    <div class="filtros-scroll mb-3">
      <button class="filtro-chip active" data-tipo="" onclick="setTipo(this,'')"><i class="bi bi-grid-fill"></i>Todos</button>
      <button class="filtro-chip" data-tipo="Moto" onclick="setTipo(this,'Moto')"><i class="bi bi-bicycle"></i>Moto</button>
      <button class="filtro-chip" data-tipo="Carro" onclick="setTipo(this,'Carro')"><i class="bi bi-car-front-fill"></i>Carro</button>
      <button class="filtro-chip" data-tipo="Pickup" onclick="setTipo(this,'Pickup')"><i class="bi bi-truck"></i>Pickup</button>
      <button class="filtro-chip" data-tipo="Microbus" onclick="setTipo(this,'Microbus')"><i class="bi bi-bus-front-fill"></i>Microbús</button>
      <button class="filtro-chip" data-tipo="Camioneta" onclick="setTipo(this,'Camioneta')"><i class="bi bi-truck-flatbed"></i>Camioneta</button>
    </div>

    <!-- Filtros precio + radio -->
    <div class="d-flex gap-2 mb-3 flex-wrap">
      <input type="number" class="form-control" id="precioFiltro" placeholder="Precio máx./hora (Q)" style="flex:1;min-width:140px;">
      <input type="number" class="form-control" id="radioFiltro" placeholder="Radio (km)" min="1" max="50" style="flex:1;min-width:100px;">
      <button class="btn-ghost" onclick="cargarParqueos()" style="white-space:nowrap;"><i class="bi bi-funnel icon-inline"></i>Filtrar</button>
    </div>

    <!-- Toggle mapa -->
    <button id="btnMapa" class="btn-ghost mb-3" style="width:100%;" onclick="toggleMap()">
      <i class="bi bi-list-check icon-inline"></i>Ver lista
    </button>
    <div id="map"></div>

    <div id="contador" class="text-muted mb-2" style="font-size:0.85rem;"></div>
    <div id="listaParqueos"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="lib/supabase-client.js"></script>
  <script src="app.js"></script>
  <script>
    let map = null, markersLayer = {}, routeLine = null, userLocation = null, allParkings = [], tipoActivo = '', focusedId = null;

    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderBottomBar('parkings');
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => { userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; cargarParqueos(); },
          () => cargarParqueos()
        );
      } else { cargarParqueos(); }
      document.getElementById('busqueda').addEventListener('keydown', e => { if (e.key === 'Enter') cargarParqueos(); });
    });

    function setTipo(btn, tipo) {
      document.querySelectorAll('.filtro-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); tipoActivo = tipo; cargarParqueos();
    }

    async function cargarParqueos() {
      const busqueda = document.getElementById('busqueda').value.trim();
      const precioMax = document.getElementById('precioFiltro').value;
      const radio = parseFloat(document.getElementById('radioFiltro').value) || 0;
      const cont = document.getElementById('listaParqueos');
      cont.innerHTML = '<div class="text-center py-4"><div class="spinner-border" role="status" style="color:var(--rdp-navy);"></div></div>';

      let parqueos = [];
      if (window.rdpSupabase && window.rdpSupabase.isConfigured) {
        const filters = {};
        if (busqueda) filters.busqueda = busqueda;
        if (precioMax) filters.precio_max = parseFloat(precioMax);
        const { data } = await window.rdpSupabase.getParkings(filters);
        parqueos = data || [];
      } else {
        const url = (userLocation && radio) ? `/api/parkings/near?lat=${userLocation.lat}&lng=${userLocation.lng}&radius=${radio}` : '/api/parkings';
        const r = await fetch(url);
        parqueos = await r.json();
        if (!Array.isArray(parqueos)) parqueos = [];
      }

      if (tipoActivo) {
        parqueos = parqueos.filter(p => {
          const tipos = Array.isArray(p.tipos_vehiculo) ? p.tipos_vehiculo : (p.tipo ? [p.tipo] : []);
          return tipos.some(t => t && t.toLowerCase().includes(tipoActivo.toLowerCase()));
        });
      }
      if (userLocation) {
        parqueos = parqueos.map(p => ({ ...p, distance: (p.lat && p.lng) ? calcDist(userLocation.lat, userLocation.lng, p.lat, p.lng) : null }));
        if (radio) parqueos = parqueos.filter(p => p.distance == null || p.distance <= radio);
        parqueos.sort((a, b) => (a.distance ?? 999) - (b.distance ?? 999));
      }

      allParkings = parqueos;
      document.getElementById('contador').textContent = `${parqueos.length} parqueo${parqueos.length !== 1 ? 's' : ''} encontrado${parqueos.length !== 1 ? 's' : ''}`;
      cont.innerHTML = '';
      if (parqueos.length === 0) {
        cont.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-search" style="font-size:2.5rem;opacity:.3;"></i><p class="mt-2">No hay parqueos disponibles</p></div>';
        return;
      }
      parqueos.forEach(p => renderCard(p, cont));
      if (!map) initMap(); else actualizarMarcadores();
    }

    // ── MAPA INTERACTIVO ──────────────────────────────────────────
    function createMarkerIcon(p, active) {
      const precio = p.precio_hora ?? p.precio;
      return L.divIcon({
        className: '',
        html: `<div class="rdp-price-badge${active ? ' rdp-price-badge--active' : ''}">${precio != null ? 'Q' + precio : '●'}</div>`,
        iconSize: null, iconAnchor: [30, 14]
      });
    }

    function focusOnMapById(id) {
      const p = allParkings.find(x => String(x.id) === String(id));
      if (p) focusOnMap(p);
    }

    function focusOnMap(p) {
      const mapDiv = document.getElementById('map');
      if (mapDiv.style.display === 'none') {
        mapDiv.style.display = 'block';
        document.getElementById('btnMapa').innerHTML = '<i class="bi bi-list-check icon-inline"></i>Ver lista';
        if (!map) initMap();
      }
      mapDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
      if (!map) return;
      setTimeout(() => {
        map.flyTo([p.lat, p.lng], 17, { duration: 0.8 });
        setFocusedParking(p);
        if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
        if (userLocation) {
          routeLine = L.polyline(
            [[userLocation.lat, userLocation.lng], [p.lat, p.lng]],
            { color: '#D4AF37', weight: 3, dashArray: '8 8', opacity: 0.9 }
          ).addTo(map);
        }
      }, 350);
    }

    function setFocusedParking(p) {
      if (focusedId) {
        document.getElementById(`card-${focusedId}`)?.classList.remove('card-parqueo--focus');
        const prev = allParkings.find(x => String(x.id) === String(focusedId));
        if (prev && markersLayer[focusedId]) markersLayer[focusedId].setIcon(createMarkerIcon(prev, false));
      }
      focusedId = p.id;
      const cardEl = document.getElementById(`card-${p.id}`);
      if (cardEl) { cardEl.classList.add('card-parqueo--focus'); cardEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      if (markersLayer[p.id]) { markersLayer[p.id].setIcon(createMarkerIcon(p, true)); markersLayer[p.id].openPopup(); }
    }

    function toggleMap() {
      const mapDiv = document.getElementById('map');
      const btn = document.getElementById('btnMapa');
      if (mapDiv.style.display === 'none') {
        mapDiv.style.display = 'block';
        btn.innerHTML = '<i class="bi bi-list-check icon-inline"></i>Ver lista';
        if (!map) initMap(); else { setTimeout(() => map.invalidateSize(), 100); actualizarMarcadores(); }
      } else {
        mapDiv.style.display = 'none';
        btn.innerHTML = '<i class="bi bi-map icon-inline"></i>Ver en mapa';
      }
    }

    function initMap() {
      if (map) { actualizarMarcadores(); return; }
      const center = userLocation || { lat: 14.566, lng: -89.355 };
      map = L.map('map').setView([center.lat, center.lng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);
      if (userLocation) {
        L.circleMarker([userLocation.lat, userLocation.lng], { radius: 9, fillColor: '#1565C0', color: '#fff', weight: 3, fillOpacity: .9 })
          .addTo(map).bindPopup('<b>Tu ubicación</b>');
      }
      actualizarMarcadores();
      setTimeout(() => map.invalidateSize(), 150);
    }

    function actualizarMarcadores() {
      Object.values(markersLayer).forEach(m => map.removeLayer(m));
      markersLayer = {};
      if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
      focusedId = null;
      allParkings.forEach(p => {
        if (!p.lat || !p.lng) return;
        const precio = p.precio_hora ?? p.precio;
        const gmaps = `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;
        const m = L.marker([p.lat, p.lng], { icon: createMarkerIcon(p, false) }).addTo(map)
          .bindPopup(`<div style="min-width:165px;">
            <strong style="color:#0F172A;">${p.nombre}</strong><br>
            <small style="color:#6b7280;">${p.direccion || ''}</small><br>
            ${precio != null ? `<span style="font-weight:700;color:#D4AF37;">Q${precio}/hr</span><br>` : ''}
            <div class="map-popup-actions">
              <a href="reserve.html?id=${p.id}" class="map-popup-btn-reservar"><i class="bi bi-calendar-check"></i> Reservar</a>
              <a href="${gmaps}" target="_blank" rel="noopener" class="map-popup-btn-ruta"><i class="bi bi-map-fill"></i> Ruta</a>
            </div>
          </div>`);
        m.on('click', () => setFocusedParking(p));
        markersLayer[p.id] = m;
      });
    }

    // ── CARDS ──────────────────────────────────────────────────────
    function tipoIcono(tipo) {
      const m = { moto: 'bi-bicycle', carro: 'bi-car-front-fill', pickup: 'bi-truck', microbus: 'bi-bus-front-fill', camioneta: 'bi-truck-flatbed', bicicleta: 'bi-bicycle' };
      return m[(tipo || '').toLowerCase()] || 'bi-car-front-fill';
    }

    function renderCard(p, cont) {
      const tipos = Array.isArray(p.tipos_vehiculo) ? p.tipos_vehiculo : (p.tipo ? [p.tipo] : []);
      const tiposHtml = tipos.map(t => `<span class="tipo-chip"><i class="bi ${tipoIcono(t)}"></i> ${t}</span>`).join('');
      const distHtml = p.distance != null ? `<small class="text-muted"><i class="bi bi-geo-alt"></i> ${p.distance.toFixed(1)} km</small>` : '';
      const estrellas = p.calificacion_promedio ? `<span class="stars">${'<i class="bi bi-star-fill" style="color:#ffc107;font-size:.8rem;"></i>'.repeat(Math.round(p.calificacion_promedio))}${'<i class="bi bi-star" style="color:#ffc107;font-size:.8rem;"></i>'.repeat(5 - Math.round(p.calificacion_promedio))}</span>` : '';
      const fotoHtml = p.foto_principal
        ? `<img src="${p.foto_principal}" alt="${p.nombre}" style="width:100%;height:140px;object-fit:cover;border-radius:12px 12px 0 0;">`
        : `<div class="parking-foto-placeholder"><i class="bi bi-car-front-fill" style="font-size:3rem;color:rgba(255,255,255,0.3);"></i></div>`;
      const precioHora = p.precio_hora ?? p.precio;
      const precioDia = p.precio_dia;
      const precioHtml = `<div class="price-row">${precioHora != null ? `<div class="price-item"><span class="price-label">Por hora</span><span class="price-val">Q${precioHora}</span></div>` : ''}${precioDia != null ? `<div class="price-item"><span class="price-label">Por día</span><span class="price-val">Q${precioDia}</span></div>` : ''}</div>`;
      const disponible = p.disponible !== false ? '<span class="parking-availability"><i class="bi bi-check-circle-fill"></i>Disponible</span>' : '';

      const card = document.createElement('div');
      card.className = 'card-parqueo mb-3';
      card.id = `card-${p.id}`;
      card.style.overflow = 'hidden';
      card.innerHTML = `
        ${fotoHtml}
        <div class="p-3">
          <div class="d-flex justify-content-between align-items-start mb-1">
            <h6 class="fw-bold mb-0" style="color:var(--rdp-navy);">${p.nombre}</h6>${estrellas}
          </div>
          <small class="text-muted"><i class="bi bi-geo-alt-fill icon-inline"></i>${p.direccion || ''}</small>
          <div class="mt-1 mb-2">${distHtml}</div>
          <div class="mb-2">${tiposHtml}</div>
          <div class="d-flex justify-content-between align-items-center">${precioHtml}${disponible}</div>
          <div class="d-flex gap-2 mt-3">
            ${(p.lat && p.lng) ? `<button class="btn-ghost" style="flex:1;padding:.5rem;font-size:.82rem;" onclick="focusOnMapById('${p.id}')"><i class="bi bi-pin-map-fill icon-inline"></i>Ver en mapa</button>` : ''}
            <a href="reserve.html?id=${p.id}" class="btn-main" style="flex:2;text-align:center;padding:.5rem;font-size:.9rem;"><i class="bi bi-calendar-check icon-inline"></i>Reservar</a>
          </div>
        </div>`;
      cont.appendChild(card);
    }

    function calcDist(lat1, lng1, lat2, lng2) {
      const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
  </script>
</body>
</html>
