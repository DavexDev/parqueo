--><!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noai, noimageai, noarchive">
  <meta name="copyright" content="© 2026 DavexDev — Todos los derechos reservados">
  <meta name="license" content="Proprietary — All Rights Reserved">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de parqueo — RDP S.A.</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Galería ── */
    .gallery-wrap { position:relative; background:#0F172A; border-radius:0; overflow:hidden; }
    .gallery-img  { width:100%; height:260px; object-fit:cover; display:none; }
    .gallery-img.active { display:block; }
    .gallery-placeholder { width:100%; height:200px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0F172A,#1e3a5f); }
    .gallery-dots { position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; gap:6px; }
    .gallery-dot  { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.4); border:none; cursor:pointer; padding:0; transition:background .15s; }
    .gallery-dot.active { background:#fff; }
    .gallery-nav  { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,.4); color:#fff; border:none; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:.9rem; }
    .gallery-nav.prev { left:10px; }
    .gallery-nav.next { right:10px; }

    /* ── Secciones ── */
    .detail-section { background:#fff; border-radius:14px; padding:1rem 1.1rem; margin-bottom:.85rem; border:1px solid var(--border); }
    .detail-section h6 { color:var(--rdp-navy); font-weight:700; margin-bottom:.6rem; font-size:.93rem; }

    /* ── Estrellas ── */
    .star-bar { display:flex; align-items:center; gap:.4rem; font-size:.8rem; }
    .star-bar-label { width:65px; color:#6b7280; }
    .star-bar-track { flex:1; height:6px; background:#e5e7eb; border-radius:3px; overflow:hidden; }
    .star-bar-fill  { height:100%; background:#ffc107; border-radius:3px; }

    /* ── Horario ── */
    .horario-row { display:flex; justify-content:space-between; align-items:center; padding:.35rem 0; border-bottom:1px solid var(--border); font-size:.86rem; }
    .horario-row:last-child { border-bottom:none; }
    .horario-row .dia { font-weight:600; color:var(--rdp-navy); min-width:80px; }

    /* ── Host card ── */
    .host-avatar { width:46px; height:46px; border-radius:50%; background:var(--rdp-navy); color:#D4AF37; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; flex-shrink:0; }

    /* ── Sticky CTA ── */
    .detail-cta-bar { position:fixed; bottom:0; left:0; right:0; z-index:200; background:#fff; border-top:1px solid var(--border); padding:.7rem 1rem; display:flex; gap:.65rem; align-items:center; box-shadow:0 -3px 12px rgba(0,0,0,.07); }
    .detail-cta-bar .precio-label { flex:1; }
    .detail-cta-bar .precio-label span { display:block; font-size:.7rem; color:#6b7280; }
    .detail-cta-bar .precio-label strong { font-size:1.1rem; color:var(--rdp-navy); }
    body { padding-bottom:80px; }

    /* ── Reseñas ── */
    .review-card { padding:.8rem 0; border-bottom:1px solid var(--border); }
    .review-card:last-child { border-bottom:none; }
    .review-stars { color:#ffc107; font-size:.8rem; }
    .nivel-seg { display:flex; gap:3px; }
    .nivel-seg i { font-size:.95rem; }

    /* ── Mapa ── */
    #miniMap { height:180px; border-radius:12px; margin-top:.5rem; z-index:1; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand" href="parkings.html"><i class="bi bi-arrow-left me-1"></i>Parqueos</a>
      <span id="navUser"></span>
    </div>
  </nav>

  <!-- Spinner inicial -->
  <div id="loadingState" class="text-center py-5">
    <div class="spinner-border" style="color:var(--rdp-navy);"></div>
  </div>

  <!-- Contenido principal -->
  <div id="mainContent" style="display:none;">

    <!-- Galería de fotos -->
    <div class="gallery-wrap" id="galleryWrap">
      <div class="gallery-placeholder" id="galleryPlaceholder">
        <i class="bi bi-car-front-fill" style="font-size:3rem;color:rgba(255,255,255,.2);"></i>
      </div>
      <button class="gallery-nav prev" id="galleryPrev" onclick="galleryNav(-1)" style="display:none;"><i class="bi bi-chevron-left"></i></button>
      <button class="gallery-nav next" id="galleryNext" onclick="galleryNav(1)" style="display:none;"><i class="bi bi-chevron-right"></i></button>
      <div class="gallery-dots" id="galleryDots"></div>
    </div>

    <div class="page-container" style="padding-top:.85rem;">

      <!-- Nombre + badges -->
      <div class="detail-section">
        <div class="d-flex align-items-start justify-content-between gap-2 mb-1">
          <h4 class="fw-bold mb-0" style="color:var(--rdp-navy);line-height:1.2;" id="pNombre">—</h4>
          <span id="pFeatured" style="display:none;" class="badge-precio ms-1" style="white-space:nowrap;">&#11088; Destacado</span>
        </div>
        <!-- Calificación -->
        <div class="d-flex align-items-center gap-2 mb-2" id="pRatingRow">
          <span id="pStars" style="color:#ffc107;font-size:.88rem;"></span>
          <span id="pRatingNum" style="font-size:.82rem;color:#6b7280;"></span>
        </div>
        <!-- Dirección -->
        <div class="d-flex align-items-start gap-1 mb-1">
          <i class="bi bi-geo-alt-fill" style="color:var(--rdp-navy);margin-top:2px;flex-shrink:0;"></i>
          <small id="pDireccion" style="color:#374151;"></small>
        </div>
        <div id="pReferencia" class="mb-2" style="font-size:.8rem;color:#6b7280;padding-left:1.2rem;"></div>
        <!-- Tipos de vehículo -->
        <div id="pTipos" class="d-flex flex-wrap gap-1 mt-2"></div>
      </div>

      <!-- Precios + capacidad -->
      <div class="detail-section">
        <h6><i class="bi bi-tag-fill icon-inline"></i>Tarifas</h6>
        <div class="d-flex gap-3 flex-wrap">
          <div id="pPrecioHora" class="text-center" style="background:rgba(15,23,42,.05);border-radius:10px;padding:.6rem 1.2rem;">
            <div style="font-size:.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">Por hora</div>
            <div style="font-size:1.5rem;font-weight:800;color:var(--rdp-navy);" id="pPrecioHoraVal">—</div>
          </div>
          <div id="pPrecioDia" class="text-center" style="background:rgba(212,175,55,.1);border-radius:10px;padding:.6rem 1.2rem;display:none;">
            <div style="font-size:.72rem;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">Por día</div>
            <div style="font-size:1.5rem;font-weight:800;color:#D4AF37;" id="pPrecioDiaVal">—</div>
          </div>
        </div>
        <div class="mt-2 d-flex align-items-center gap-2">
          <i class="bi bi-car-front-fill" style="color:var(--rdp-navy);"></i>
          <small id="pCapacidad" style="color:#374151;"></small>
          <span id="pSeguridad" class="ms-auto nivel-seg"></span>
        </div>
      </div>

      <!-- Descripción -->
      <div class="detail-section" id="secDescripcion" style="display:none;">
        <h6><i class="bi bi-info-circle icon-inline"></i>Descripción</h6>
        <p id="pDescripcion" style="font-size:.88rem;color:#374151;margin:0;line-height:1.6;"></p>
      </div>

      <!-- Reglas -->
      <div class="detail-section" id="secReglas" style="display:none;">
        <h6><i class="bi bi-shield-check icon-inline"></i>Reglas del lugar</h6>
        <ul id="pReglas" style="font-size:.86rem;color:#374151;padding-left:1.2rem;margin:0;line-height:1.8;"></ul>
      </div>

      <!-- Horarios -->
      <div class="detail-section" id="secHorarios" style="display:none;">
        <h6><i class="bi bi-clock icon-inline"></i>Horarios</h6>
        <div id="pHorarios"></div>
      </div>

      <!-- Anfitrión -->
      <div class="detail-section">
        <h6><i class="bi bi-person-circle icon-inline"></i>Anfitrión</h6>
        <div class="d-flex align-items-center gap-3">
          <div class="host-avatar" id="hostAvatar">?</div>
          <div>
            <div class="fw-bold" id="hostNombre" style="color:var(--rdp-navy);"></div>
            <small class="text-muted">Anfitrión verificado</small>
          </div>
          <button class="btn-ghost ms-auto" id="btnChatHost" style="padding:.45rem .9rem;font-size:.82rem;">
            <i class="bi bi-chat-dots icon-inline"></i>Chat
          </button>
        </div>
      </div>

      <!-- Ubicación -->
      <div class="detail-section" id="secUbicacion" style="display:none;">
        <h6><i class="bi bi-map icon-inline"></i>Ubicación</h6>
        <div id="miniMap"></div>
        <a id="btnGmaps" href="#" target="_blank" rel="noopener" class="btn-ghost mt-2" style="width:100%;display:block;text-align:center;padding:.5rem;">
          <i class="bi bi-geo-alt icon-inline"></i>Cómo llegar en Google Maps
        </a>
      </div>

      <!-- Reseñas -->
      <div class="detail-section" id="secResenas" style="display:none;">
        <h6><i class="bi bi-star-half icon-inline"></i>Reseñas</h6>
        <!-- Resumen -->
        <div class="d-flex align-items-center gap-3 mb-3" id="reviewSummary"></div>
        <!-- Barras por categoría -->
        <div id="reviewBars" class="mb-3"></div>
        <!-- Comentarios -->
        <div id="reviewList"></div>
        <!-- Botón escribir reseña (solo si tiene reserva completada) -->
        <div id="reviewWriteWrap" class="mt-2" style="display:none;">
          <a id="btnWriteReview" href="#" class="btn-ghost" style="width:100%;display:block;text-align:center;padding:.5rem;font-size:.85rem;">
            <i class="bi bi-pencil-square icon-inline"></i>Escribir reseña
          </a>
        </div>
      </div>

    </div><!-- /page-container -->
  </div><!-- /mainContent -->

  <!-- CTA fija abajo -->
  <div class="detail-cta-bar" id="ctaBar" style="display:none;">
    <div class="precio-label">
      <span>Desde</span>
      <strong id="ctaPrecio">Q15/hr</strong>
    </div>
    <a id="ctaReservar" href="#" class="btn-main" style="flex:2;text-align:center;padding:.65rem;">
      <i class="bi bi-calendar-check icon-inline"></i>Reservar
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="lib/supabase-client.js"></script>
  <script src="lib/push.js"></script>
  <script src="app.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const parqueoId = urlParams.get('id');
    let parqueo = null, galImgs = [], galIdx = 0;

    document.addEventListener('DOMContentLoaded', async () => {
      renderNavbar();
      if (!parqueoId) { mostrarError('ID de parqueo no especificado'); return; }
      await cargarTodo();
    });

    async function cargarTodo() {
      const [{ data: p }, { data: fotos }, { data: horarios }, { data: resenas }] = await Promise.all([
        window.rdpSupabase.getParkingById(parqueoId),
        window.rdpSupabase.getParkingPhotos(parqueoId),
        window.rdpSupabase.getParkingSchedules(parqueoId),
        window.rdpSupabase.getParkingRatings(parqueoId)
      ]);

      if (!p) { mostrarError('Parqueo no encontrado'); return; }
      parqueo = p;
      document.title = `${p.nombre} — RDP S.A.`;

      renderGaleria(fotos || []);
      renderInfo(p);
      renderHorarios(horarios || []);
      renderResenas(resenas || []);

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('ctaBar').style.display = 'flex';
    }

    // ── GALERÍA ───────────────────────────────────────────────────
    function renderGaleria(fotos) {
      const wrap = document.getElementById('galleryWrap');
      if (fotos.length === 0) {
        if (parqueo.foto_principal) {
          fotos = [{ url: parqueo.foto_principal }];
        } else { return; }
      }
      document.getElementById('galleryPlaceholder').style.display = 'none';
      galImgs = fotos;
      fotos.forEach((f, i) => {
        const img = document.createElement('img');
        img.src = f.url; img.alt = parqueo.nombre;
        img.className = 'gallery-img' + (i === 0 ? ' active' : '');
        wrap.insertBefore(img, document.getElementById('galleryPrev'));
      });
      if (fotos.length > 1) {
        document.getElementById('galleryPrev').style.display = 'flex';
        document.getElementById('galleryNext').style.display = 'flex';
        const dotsEl = document.getElementById('galleryDots');
        fotos.forEach((_, i) => {
          const d = document.createElement('button');
          d.className = 'gallery-dot' + (i === 0 ? ' active' : '');
          d.onclick = () => setGalIdx(i);
          dotsEl.appendChild(d);
        });
      }
    }

    function setGalIdx(i) {
      const imgs = document.querySelectorAll('.gallery-img');
      const dots = document.querySelectorAll('.gallery-dot');
      imgs[galIdx]?.classList.remove('active');
      dots[galIdx]?.classList.remove('active');
      galIdx = (i + galImgs.length) % galImgs.length;
      imgs[galIdx]?.classList.add('active');
      dots[galIdx]?.classList.add('active');
    }
    function galleryNav(dir) { setGalIdx(galIdx + dir); }

    // ── INFO PRINCIPAL ────────────────────────────────────────────
    function renderInfo(p) {
      const precioHora = p.precio_hora ?? p.precio;
      const precioDia  = p.precio_dia;

      document.getElementById('pNombre').textContent = p.nombre;

      if (p.is_featured) document.getElementById('pFeatured').style.display = '';

      // Calificación
      if (p.calificacion_promedio) {
        const avg = parseFloat(p.calificacion_promedio);
        document.getElementById('pStars').innerHTML = estrellas(avg);
        document.getElementById('pRatingNum').textContent = `${avg.toFixed(1)} · ${p.total_resenas || 0} reseña${(p.total_resenas||0) !== 1 ? 's' : ''}`;
      } else {
        document.getElementById('pRatingRow').innerHTML = '<small class="text-muted">Sin reseñas aún</small>';
      }

      document.getElementById('pDireccion').textContent = p.direccion || '';
      if (p.referencia) document.getElementById('pReferencia').textContent = '📌 ' + p.referencia;

      // Tipos vehículo
      const tipos = Array.isArray(p.tipos_vehiculo) ? p.tipos_vehiculo : [];
      const tiposEl = document.getElementById('pTipos');
      tipos.forEach(t => {
        const span = document.createElement('span');
        span.className = 'tipo-chip';
        span.innerHTML = `<i class="bi ${tipoIcono(t)}"></i> ${t}`;
        tiposEl.appendChild(span);
      });

      // Precios
      if (precioHora != null) {
        document.getElementById('pPrecioHoraVal').textContent = `Q${precioHora}`;
        document.getElementById('ctaPrecio').textContent = `Q${precioHora}/hr`;
      }
      if (precioDia != null) {
        document.getElementById('pPrecioDia').style.display = '';
        document.getElementById('pPrecioDiaVal').textContent = `Q${precioDia}`;
      }

      // Capacidad + Seguridad
      document.getElementById('pCapacidad').textContent = `Capacidad: ${p.capacidad || '—'} vehículo${(p.capacidad||0) !== 1 ? 's' : ''}`;
      if (p.nivel_seguridad) {
        const segs = document.getElementById('pSeguridad');
        for (let i = 1; i <= 5; i++) {
          segs.innerHTML += `<i class="bi bi-shield${i <= p.nivel_seguridad ? '-fill' : ''}" style="color:${i <= p.nivel_seguridad ? '#D4AF37' : '#e5e7eb'};"></i>`;
        }
      }

      // Descripción
      if (p.descripcion) {
        document.getElementById('pDescripcion').textContent = p.descripcion;
        document.getElementById('secDescripcion').style.display = '';
      }

      // Reglas
      if (p.reglas) {
        const rulesEl = document.getElementById('pReglas');
        p.reglas.split('.').filter(r => r.trim()).forEach(r => {
          const li = document.createElement('li');
          li.textContent = r.trim();
          rulesEl.appendChild(li);
        });
        document.getElementById('secReglas').style.display = '';
      }

      // Anfitrión
      const nombre = p.anfitrion_nombre || 'Anfitrión';
      document.getElementById('hostNombre').textContent = nombre;
      document.getElementById('hostAvatar').textContent = initiales(nombre);
      document.getElementById('btnChatHost').onclick = () => {
        const session = JSON.parse(localStorage.getItem('rdp_user') || '{}');
        if (!session?.id) { window.location.href = 'login.html'; return; }
        window.location.href = `messages.html?chat=${p.anfitrion_id}`;
      };

      // Mapa
      if (p.lat && p.lng) {
        document.getElementById('secUbicacion').style.display = '';
        document.getElementById('btnGmaps').href = `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;
        setTimeout(() => initMiniMap(p.lat, p.lng, p.nombre), 200);
      }

      // CTA
      document.getElementById('ctaReservar').href = `reserve.html?id=${p.id}`;
    }

    function initMiniMap(lat, lng, nombre) {
      const m = L.map('miniMap', { zoomControl: false, attributionControl: false })
        .setView([lat, lng], 17);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(m);
      L.marker([lat, lng]).addTo(m).bindPopup(`<b>${nombre}</b>`).openPopup();
      setTimeout(() => m.invalidateSize(), 150);
    }

    // ── HORARIOS ─────────────────────────────────────────────────
    const DIAS = { lunes:'Lunes', martes:'Martes', miercoles:'Miércoles', jueves:'Jueves', viernes:'Viernes', sabado:'Sábado', domingo:'Domingo' };

    function renderHorarios(horarios) {
      if (!horarios.length) return;
      const el = document.getElementById('pHorarios');
      horarios.forEach(h => {
        const div = document.createElement('div');
        div.className = 'horario-row';
        div.innerHTML = `<span class="dia">${DIAS[h.dia_semana] || h.dia_semana}</span><span style="color:#374151;">${h.hora_inicio.slice(0,5)} – ${h.hora_fin.slice(0,5)}</span>`;
        el.appendChild(div);
      });
      document.getElementById('secHorarios').style.display = '';
    }

    // ── RESEÑAS ───────────────────────────────────────────────────
    function renderResenas(resenas) {
      if (!resenas.length) return;
      document.getElementById('secResenas').style.display = '';

      const avg  = resenas.reduce((s, r) => s + r.estrellas, 0) / resenas.length;
      const avgL = resenas.reduce((s, r) => s + (r.estrellas_limpieza||0), 0) / resenas.length;
      const avgS = resenas.reduce((s, r) => s + (r.estrellas_seguridad||0), 0) / resenas.length;
      const avgA = resenas.reduce((s, r) => s + (r.estrellas_acceso||0), 0) / resenas.length;

      // Resumen
      document.getElementById('reviewSummary').innerHTML = `
        <div style="text-align:center;">
          <div style="font-size:2.5rem;font-weight:800;color:var(--rdp-navy);line-height:1;">${avg.toFixed(1)}</div>
          <div style="color:#ffc107;">${estrellas(avg)}</div>
          <small class="text-muted">${resenas.length} reseña${resenas.length !== 1 ? 's' : ''}</small>
        </div>`;

      // Barras por categoría
      const bars = document.getElementById('reviewBars');
      [['Limpieza', avgL], ['Seguridad', avgS], ['Acceso', avgA]].forEach(([label, val]) => {
        if (!val) return;
        bars.innerHTML += `<div class="star-bar mb-1">
          <span class="star-bar-label">${label}</span>
          <div class="star-bar-track"><div class="star-bar-fill" style="width:${(val/5)*100}%"></div></div>
          <span style="font-size:.76rem;color:#6b7280;min-width:24px;text-align:right;">${val.toFixed(1)}</span>
        </div>`;
      });

      // Comentarios
      const list = document.getElementById('reviewList');
      resenas.slice(0, 5).forEach(r => {
        const nombre = r.profiles?.nombre || 'Usuario';
        const div = document.createElement('div');
        div.className = 'review-card';
        div.innerHTML = `
          <div class="d-flex align-items-center gap-2 mb-1">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--rdp-navy);color:#D4AF37;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;flex-shrink:0;">${initiales(nombre)}</div>
            <div>
              <div class="fw-bold" style="font-size:.85rem;color:var(--rdp-navy);">${esc(nombre)}</div>
              <div class="review-stars">${estrellas(r.estrellas)}</div>
            </div>
            <small class="text-muted ms-auto">${fmtDate(r.created_at)}</small>
          </div>
          ${r.comentario ? `<p style="font-size:.84rem;color:#374151;margin:0;">${esc(r.comentario)}</p>` : ''}`;
        list.appendChild(div);
      });

      // Botón de reseña
      const session = JSON.parse(localStorage.getItem('rdp_user') || '{}');
      if (session?.id) {
        document.getElementById('reviewWriteWrap').style.display = '';
        document.getElementById('btnWriteReview').href = `reviews.html?parking=${parqueoId}`;
      }
    }

    // ── HELPERS ───────────────────────────────────────────────────
    function mostrarError(msg) {
      document.getElementById('loadingState').innerHTML = `
        <div class="text-center py-5 text-muted">
          <i class="bi bi-exclamation-circle" style="font-size:2.5rem;opacity:.4;"></i>
          <p class="mt-2">${msg}</p>
          <a href="parkings.html" class="btn-ghost" style="display:inline-block;padding:.5rem 1rem;">Volver</a>
        </div>`;
    }

    function tipoIcono(tipo) {
      const m = { moto:'bi-bicycle', carro:'bi-car-front-fill', pickup:'bi-truck', microbus:'bi-bus-front-fill', camioneta:'bi-truck-flatbed', bicicleta:'bi-bicycle' };
      return m[(tipo||'').toLowerCase()] || 'bi-car-front-fill';
    }

    function estrellas(avg) {
      const full = Math.round(avg), empty = 5 - full;
      return '<i class="bi bi-star-fill"></i>'.repeat(full) + '<i class="bi bi-star"></i>'.repeat(empty);
    }

    function initiales(nombre) {
      return (nombre || '?').split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('es-GT', { day: 'numeric', month: 'short', year: 'numeric' });
    }
  </script>
</body>
</html>
