<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservar Parqueo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html">🅿️ Parqueos</a>
    </div>
  </nav>

  <div class="page-container">
    <h2 class="section-title">📅 Reservar parqueo</h2>
    <div id="infoParqueo" class="mb-3"></div>
    <div id="mapaParqueo" class="mb-3"></div>
    <form id="formReserva" class="card-parqueo p-3">
      <div class="mb-3">
        <label for="fecha" class="form-label">Fecha de visita</label>
        <input type="date" class="form-control" id="fecha" required>
      </div>
      <button type="submit" class="btn-main">📅 Reservar ahora</button>
    </form>
    <div id="estadoReserva" class="mt-3"></div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = requireLogin(['visitante']);
    if (!user) throw new Error('No session');
    document.addEventListener('DOMContentLoaded', () => { renderNavbar(); renderBottomBar('parkings'); });
    const urlParams = new URLSearchParams(window.location.search);
    const parqueoId = urlParams.get('id');
    let parqueo;
    fetch('/api/parkings')
      .then(r => r.json())
      .then(data => {
        parqueo = data.find(p => p.id == parqueoId);
        if (!parqueo) {
          document.getElementById('infoParqueo').innerHTML = '<div class="alert alert-danger alert-parqueo">Parqueo no encontrado</div>';
          document.getElementById('formReserva').style.display = 'none';
          document.getElementById('mapaParqueo').innerHTML = '';
        } else {
          const icon = parqueo.tipo === 'moto' ? '🏍️' : '🚗';
          document.getElementById('infoParqueo').innerHTML = `
            <div class="card-parqueo p-3">
              <div class="d-flex align-items-center gap-3 mb-2">
                <div class="parking-icon">${icon}</div>
                <div>
                  <h5 class="fw-bold mb-0">${parqueo.nombre}</h5>
                  <small class="text-muted">${parqueo.direccion}</small>
                </div>
              </div>
              <div class="d-flex gap-2 mb-2">
                <span class="badge-tipo">${parqueo.tipo}</span>
                <span class="badge-precio">Q${parqueo.precio}</span>
              </div>
              <a href="https://maps.google.com/?q=${parqueo.lat},${parqueo.lng}" target="_blank" rel="noopener" class="btn-ghost" style="padding:0.5rem;font-size:0.9rem;">📍 Abrir en Google Maps</a>
            </div>
          `;
          document.getElementById('mapaParqueo').innerHTML = `
            <iframe width="100%" height="200" style="border:0;border-radius:14px;" loading="lazy" allowfullscreen
              referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps?q=${parqueo.lat},${parqueo.lng}&hl=es&z=17&output=embed">
            </iframe>
          `;
        }
      });
    document.getElementById('formReserva').addEventListener('submit', function(e) {
      e.preventDefault();
      const fecha = document.getElementById('fecha').value;
      fetch('/api/reservations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ parqueoId: Number(parqueoId), usuarioId: user.id, fecha })
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          document.getElementById('estadoReserva').innerHTML = `<div class='alert alert-success alert-parqueo'>✅ Reserva creada. Estado: <b>${resp.reserva.estado}</b></div>`;
        } else {
          document.getElementById('estadoReserva').innerHTML = `<div class='alert alert-danger alert-parqueo'>Error al reservar</div>`;
        }
      });
    });
  </script>
</body>
</html>
