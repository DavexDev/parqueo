--><!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noai, noimageai, noarchive">

  <meta name="license" content="Proprietary — All Rights Reserved">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-container" style="padding:0.75rem 1rem 0.5rem; max-width:900px; margin:0 auto; padding-bottom:80px;">
    <div class="chat-wrapper" id="chatWrapper">

      <!-- Panel izquierdo: contactos -->
      <div class="chat-panel-left" id="panelIzq">
        <div class="chat-contacts-header">
          <i class="bi bi-chat-dots-fill icon-inline"></i>Mensajes
        </div>
        <div id="adminSearchBox" style="display:none;padding:.5rem .75rem;border-bottom:1px solid var(--border);">
          <input type="search" id="contactSearch" class="form-control form-control-sm" placeholder="Buscar usuario..." oninput="filtrarContactos(this.value)" style="border-radius:20px;">
        </div>
        <div class="chat-contacts-list" id="contactos">
          <div class="text-center py-4"><div class="spinner-border spinner-border-sm" style="color:var(--rdp-navy);"></div></div>
        </div>
      </div>

      <!-- Panel derecho: conversación -->
      <div class="chat-panel-right" id="panelDer">
        <div class="chat-msg-header" id="chatHeader" style="display:none;">
          <button class="btn-back-chat d-sm-none" onclick="volverContactos()" title="Volver">
            <i class="bi bi-arrow-left"></i>
          </button>
          <div id="chatAvatar" style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);color:#D4AF37;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0;border:2px solid rgba(212,175,55,.3);"></div>
          <div style="flex:1;min-width:0;">
            <div class="chat-header-name" id="chatNombre"></div>
            <div class="chat-header-sub" id="chatStatus">en línea</div>
          </div>
        </div>

        <div class="chat-messages" id="chatBox" style="flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.35rem;">
          <div id="chatEmptyState" class="text-center" style="margin:auto;opacity:.55;">
            <i class="bi bi-chat-square-dots" style="font-size:3rem;display:block;margin-bottom:.75rem;color:var(--rdp-navy);opacity:.35;"></i>
            <div style="font-size:.9rem;color:#6b7280;">Selecciona un contacto para chatear</div>
          </div>
        </div>
        <button class="chat-scroll-btn" id="scrollDownBtn" onclick="scrollToBottom(true)" title="Ir al final">
          <i class="bi bi-chevron-down"></i>
        </button>

        <div class="chat-footer-bar" id="chatFooter" style="display:none;">
          <form id="formMsg">
            <div class="chat-footer-inner">
              <input type="text" class="form-control border-0 p-0" id="textoMsg" placeholder="Escribe un mensaje..." autocomplete="off" required>
              <button type="submit" class="chat-send-btn">
                <i class="bi bi-send-fill"></i>
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="lib/push.js"></script>
  <script src="app.js"></script>
  <script src="lib/supabase-client.js"></script>
  <script>
    const user = requireLogin(['visitante', 'anfitrion', 'admin']);
    if (!user) throw new Error('No session');
    const currentUserId = user.id;
    const isAdmin = user.rol === 'admin';
    let chatWithId = null, chatWithNombre = '', convSub = null, typingTimer = null;

    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderBottomBar('messages');
      if (isAdmin) document.getElementById('adminSearchBox').style.display = '';
      cargarContactos();
      document.getElementById('formMsg').addEventListener('submit', enviarMensaje);
      document.getElementById('textoMsg').addEventListener('input', onTyping);

      // Scroll-to-bottom button visibility
      document.getElementById('chatBox').addEventListener('scroll', () => {
        const box = document.getElementById('chatBox');
        const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 80;
        document.getElementById('scrollDownBtn')?.classList.toggle('visible', !atBottom);
      });

      // Notificaciones push
      if (window.rdpPush && user?.id) {
        window.rdpPush.init(user.id).catch(() => {});
      }
    });

    // ── HELPERS ───────────────────────────────────────────────────
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso), now = new Date(), diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'ahora';
      if (diff < 3600) return Math.floor(diff / 60) + 'm';
      if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('es-GT', { hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('es-GT', { day: 'numeric', month: 'short' });
    }

    function initiales(nombre) {
      return (nombre || '?').split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }

    // ── CONTACTOS ─────────────────────────────────────────────────
    async function cargarContactos() {
      if (!window.rdpSupabase?.isConfigured) return;
      const { data } = await window.rdpSupabase.getConversations(currentUserId);
      const msgs = data || [];
      const map = {};
      msgs.forEach(m => {
        const otherId = m.sender_id === currentUserId ? m.receiver_id : m.sender_id;
        const profile = m.sender_id === currentUserId ? m.receiver : m.sender;
        if (!profile) return;
        if (!map[otherId]) {
          map[otherId] = { id: otherId, nombre: profile.nombre || 'Usuario', lastMsg: m.contenido || '', lastTime: m.created_at, unread: 0 };
        }
        if (!m.leido && m.receiver_id === currentUserId) map[otherId].unread++;
      });

      // Admin: merge all users so they can start conversations with anyone
      if (isAdmin && window.rdpSupabase.getAdminUsers) {
        const { data: allUsers } = await window.rdpSupabase.getAdminUsers();
        (allUsers || []).forEach(u => {
          if (u.id !== currentUserId && !map[u.id]) {
            map[u.id] = { id: u.id, nombre: u.nombre || u.email || 'Usuario', lastMsg: '', lastTime: null, unread: 0 };
          }
        });
      }

      const contactos = Object.values(map).sort((a, b) => {
        if (!a.lastTime && !b.lastTime) return a.nombre.localeCompare(b.nombre);
        if (!a.lastTime) return 1;
        if (!b.lastTime) return -1;
        return new Date(b.lastTime) - new Date(a.lastTime);
      });

      renderContactos(contactos);
      // URL param
      const params = new URLSearchParams(window.location.search);
      if (params.get('chat')) {
        const target = contactos.find(c => c.id === params.get('chat'));
        if (target) abrirConversacion(target.id, target.nombre, null);
      }
    }

    let _todosContactos = [];
    function renderContactos(contactos) {
      _todosContactos = contactos;
      _renderContactosFiltrados(contactos);
    }

    function filtrarContactos(q) {
      const qq = q.toLowerCase().trim();
      _renderContactosFiltrados(qq ? _todosContactos.filter(c => c.nombre.toLowerCase().includes(qq)) : _todosContactos);
    }

    function _renderContactosFiltrados(contactos) {
      const cont = document.getElementById('contactos');
      cont.innerHTML = '';
      if (contactos.length === 0) {
        cont.innerHTML = '<div class="text-muted small p-3 text-center">Sin conversaciones aún</div>';
        return;
      }
      contactos.forEach(c => {
        const li = document.createElement('div');
        li.className = 'contact-item p-2 d-flex align-items-center gap-2';
        li.id = `contact-${c.id}`;
        li.style.cssText = 'cursor:pointer;border-bottom:1px solid var(--border);';
        li.innerHTML = `
          <div style="width:40px;height:40px;border-radius:50%;background:var(--rdp-navy);color:#D4AF37;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;flex-shrink:0;">${esc(initiales(c.nombre))}</div>
          <div style="flex:1;min-width:0;">
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-600" style="color:var(--rdp-navy);font-size:.88rem;">${esc(c.nombre)}</span>
              <small style="color:var(--text-muted,#9ca3af);font-size:.7rem;">${c.lastTime ? fmtTime(c.lastTime) : ''}</small>
            </div>
            <div class="contact-last-msg">${esc(c.lastMsg || (c.lastTime ? '' : 'Iniciar conversación'))}</div>
          </div>
          ${c.unread > 0 ? '<div class="unread-dot ms-1"></div>' : ''}`;
        li.addEventListener('click', () => abrirConversacion(c.id, c.nombre, li));
        cont.appendChild(li);
      });
    }

    // ── CONVERSACIÓN ──────────────────────────────────────────────
    function abrirConversacion(otherId, nombre, itemEl) {
      chatWithId = otherId;
      chatWithNombre = nombre;

      // Mobile: ocultar panel izquierdo
      document.getElementById('panelIzq').classList.add('hidden-mobile');

      // Actualizar header
      const header = document.getElementById('chatHeader');
      header.style.display = 'flex';
      document.getElementById('chatNombre').textContent = nombre;
      document.getElementById('chatAvatar').textContent = initiales(nombre);
      document.getElementById('chatStatus').textContent = 'en línea';

      // Mostrar footer
      document.getElementById('chatFooter').style.display = 'block';

      // Marcar activo en contactos
      document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
      if (itemEl) itemEl.classList.add('active');

      // Cancelar suscripción previa
      if (convSub) { convSub.unsubscribe(); convSub = null; }

      // Limpiar chat
      const box = document.getElementById('chatBox');
      box.innerHTML = '<div style="margin:auto;text-align:center;opacity:.5;"><div class="spinner-border spinner-border-sm" style="color:var(--rdp-navy);"></div></div>';
      document.getElementById('chatEmptyState')?.remove();

      // Cargar historial + nueva suscripción WebSocket
      cargarMensajes().then(() => {
        convSub = window.rdpSupabase.subscribeToConversation(
          currentUserId, otherId,
          (msg) => {
            appendMsg(msg, false);
            window.rdpSupabase.getClient()?.from('messages')
              .update({ leido: true, leido_at: new Date().toISOString() })
              .eq('id', msg.id);
            // Limpiar unread dot
            document.querySelector(`#contact-${otherId} .unread-dot`)?.remove();
          },
          () => mostrarTyping()
        );
        // Marcar mensajes como leídos al abrir
        window.rdpSupabase.getClient()?.from('messages')
          .update({ leido: true, leido_at: new Date().toISOString() })
          .eq('receiver_id', currentUserId).eq('sender_id', otherId).eq('leido', false);
      });
    }

    async function cargarMensajes() {
      const box = document.getElementById('chatBox');
      const { data } = await window.rdpSupabase.getClient()
        .from('messages')
        .select('*')
        .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${chatWithId}),and(sender_id.eq.${chatWithId},receiver_id.eq.${currentUserId})`)
        .is('deleted_at', null)
        .order('created_at', { ascending: true });
      box.innerHTML = '';
      if (!data || data.length === 0) {
        box.innerHTML = '<div style="margin:auto;text-align:center;opacity:.5;font-size:.85rem;color:#6b7280;">No hay mensajes aún. ¡Envía el primero!</div>';
        return;
      }
      (data || []).forEach(m => appendMsg(m, m.sender_id === currentUserId));
    }

    function appendMsg(msg, isOwn) {
      document.getElementById('rdp-typing')?.remove();
      const box = document.getElementById('chatBox');
      box.querySelector('.text-muted, .text-center')?.remove();

      // ── Date separator ────────────────────────────────────────
      const msgDate = new Date(msg.created_at).toDateString();
      const lastSep = box.querySelector('.chat-date-sep:last-of-type');
      const lastSepDate = lastSep?.dataset.date;
      if (msgDate !== lastSepDate) {
        const now = new Date(), d = new Date(msg.created_at);
        const diffDays = Math.floor((now - d) / 86400000);
        let label = diffDays === 0 ? 'Hoy' : diffDays === 1 ? 'Ayer' : d.toLocaleDateString('es-GT', { day: 'numeric', month: 'long', year: diffDays > 365 ? 'numeric' : undefined });
        const sep = document.createElement('div');
        sep.className = 'chat-date-sep';
        sep.dataset.date = msgDate;
        sep.innerHTML = `<span>${label}</span>`;
        box.appendChild(sep);
      }

      const el = document.createElement('div');
      el.style.cssText = `display:flex;flex-direction:column;align-items:${isOwn ? 'flex-end' : 'flex-start'};`;
      const readIcon = isOwn ? `<i class="bi bi-check${msg.leido ? '2' : ''}-all ms-1" style="font-size:.63rem;color:${msg.leido ? '#D4AF37' : 'rgba(255,255,255,.45)'};" title="${msg.leido ? 'Leído' : 'Enviado'}"></i>` : '';
      el.innerHTML = `
        <div class="msg-bubble ${isOwn ? 'msg-out' : 'msg-in'}" style="max-width:75%;">
          <div style="word-break:break-word;">${esc(msg.contenido)}</div>
          <div style="display:flex;align-items:center;justify-content:flex-end;gap:2px;margin-top:3px;">
            <small style="font-size:.63rem;opacity:.65;">${fmtTime(msg.created_at)}</small>${readIcon}
          </div>
        </div>`;
      box.appendChild(el);
      scrollToBottom();
    }

    function scrollToBottom(force = false) {
      const box = document.getElementById('chatBox');
      const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 80;
      if (force || atBottom) {
        box.scrollTop = box.scrollHeight;
        document.getElementById('scrollDownBtn')?.classList.remove('visible');
      } else {
        document.getElementById('scrollDownBtn')?.classList.add('visible');
      }
    }

    function mostrarTyping() {
      document.getElementById('rdp-typing')?.remove();
      clearTimeout(typingTimer);
      const box = document.getElementById('chatBox');
      const el = document.createElement('div');
      el.id = 'rdp-typing';
      el.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;';
      el.innerHTML = `<div class="msg-bubble msg-in" style="max-width:75%;padding:8px 14px;"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
      box.appendChild(el);
      scrollToBottom();
      typingTimer = setTimeout(() => el.remove(), 4000);
    }

    function onTyping() {
      if (convSub) convSub.sendTyping();
    }

    function volverContactos() {
      document.getElementById('panelIzq').classList.remove('hidden-mobile');
    }

    async function enviarMensaje(e) {
      e.preventDefault();
      const input = document.getElementById('textoMsg');
      const texto = input.value.trim();
      if (!texto || !chatWithId) return;
      input.value = '';

      // Optimistic: mostrar inmediatamente
      const optimistic = { id: 'opt-' + Date.now(), sender_id: currentUserId, receiver_id: chatWithId, contenido: texto, created_at: new Date().toISOString(), leido: false };
      appendMsg(optimistic, true);

      const { data: sent, error } = await window.rdpSupabase.sendMessage({ sender_id: currentUserId, receiver_id: chatWithId, contenido: texto });
      if (error) {
        document.querySelector(`[data-opt="${optimistic.id}"]`)?.remove();
      } else {
        // Reemplazar mensaje optimista con el real (ID correcto)
        const optEl = document.querySelector(`[data-opt="${optimistic.id}"]`);
        if (optEl && sent) optEl.dataset.opt = sent.id;
        // Broadcast al receptor via canal compartido (tiempo real)
        if (convSub && sent) convSub.sendBroadcast(sent);
        // Notificar al destinatario vía push broadcast
        if (window.rdpPush) {
          window.rdpPush.notify(chatWithId, `Nuevo mensaje de ${user.nombre}`, texto.substring(0, 80), `messages.html?chat=${currentUserId}`).catch(() => {});
        }
      }
    }
  </script>
</body>
</html>
