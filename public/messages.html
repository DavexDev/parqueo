--><!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensajes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html"><i class="bi bi-p-circle-fill icon-inline"></i>Parqueos</a>
    </div>
  </nav>

  <div class="page-container" style="padding-bottom:80px;">
    <h2 class="section-title"><i class="bi bi-chat-dots-fill icon-inline"></i>Mensajes</h2>
    <div id="userInfo" class="mb-3"></div>

    <div class="chat-container">
      <div class="chat-contacts" id="contactos"></div>
      <div class="chat-messages">
        <div id="chatBox">
          <div class="text-muted text-center" style="padding-top:3rem;">Selecciona un contacto para chatear</div>
        </div>
        <form id="formMsg" class="mt-2 d-flex gap-2" style="display:none;">
          <input type="text" class="form-control" id="textoMsg" placeholder="Escribe un mensaje..." required>
          <button type="submit" class="btn-main" style="min-width:auto;padding:0.6rem 1rem;"><i class="bi bi-send-fill"></i></button>
        </form>
        <div id="emailStatus" class="mt-2 small"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script src="lib/supabase-client.js"></script>
  <script>
    const user = requireLogin(['visitante', 'anfitrion']);
    if (!user) throw new Error('No session');
    const currentUserId = user.id;
    const currentRol = user.rol;
    let chatWithId = null;
    let unsubscribeMessages = null;

    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderBottomBar('messages');
      document.getElementById('userInfo').innerHTML =
        `<span class="badge-rol">${user.nombre}</span> <span class="badge-tipo">${user.rol}</span>`;
      cargarContactos();
    });

    function cargarContactos() {
      if (window.rdpSupabase?.isConfigured) {
        window.rdpSupabase.getConversations(currentUserId)
          .then(({ data, error }) => {
            const msgs = data || [];
            const contactMap = {};
            msgs.forEach(m => {
              const otherId = m.sender_id === currentUserId ? m.receiver_id : m.sender_id;
              const otherProfile = m.sender_id === currentUserId ? m.receiver : m.sender;
              if (!contactMap[otherId] && otherProfile) {
                contactMap[otherId] = { id: otherId, nombre: otherProfile.nombre, foto: otherProfile.foto_url };
              }
            });
            renderContactos(Object.values(contactMap));

            // Activar chat por URL param
            const params = new URLSearchParams(window.location.search);
            if (params.get('chat')) {
              chatWithId = params.get('chat');
              cargarChat();
              document.getElementById('formMsg').style.display = 'flex';
            }
          });
        return;
      }
      cargarContactosExpress();
    }

    function renderContactos(contactos) {
      const cont = document.getElementById('contactos');
      cont.innerHTML = '';
      if (contactos.length === 0) {
        cont.innerHTML = '<div class="text-muted small p-3">No hay contactos disponibles</div>';
        return;
      }
      contactos.forEach(u => {
        cont.innerHTML += `
          <div class="contact-item" data-id="${u.id}">
            <div class="d-flex align-items-center gap-2">
              <span class="icon-only" style="font-size:1.2rem;"><i class="bi bi-person-circle"></i></span>
              <div>
                <div class="fw-bold">${u.nombre || 'Usuario'}</div>
              </div>
            </div>
          </div>`;
      });
      cont.querySelectorAll('.contact-item').forEach(btn => {
        btn.addEventListener('click', function() {
          chatWithId = this.dataset.id;
          cargarChat();
          document.getElementById('formMsg').style.display = 'flex';
          cont.querySelectorAll('.contact-item').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
        });
      });
    }

    function cargarContactosExpress() {
      fetch('/api/messages?userId=' + currentUserId)
        .then(r => r.json())
        .then(msgs => {
          const idsConMensaje = new Set();
          msgs.forEach(m => {
            if (m.deId !== currentUserId) idsConMensaje.add(m.deId);
            if (m.paraId !== currentUserId) idsConMensaje.add(m.paraId);
          });
          fetch('/api/admin/users')
            .then(r => r.json())
            .then(users => {
              const cont = document.getElementById('contactos');
              cont.innerHTML = '';
              let contactos;
              if (currentRol === 'visitante') {
                contactos = users.filter(u => u.id !== currentUserId && u.rol === 'anfitrion');
              } else {
                contactos = users.filter(u => u.id !== currentUserId && u.rol === 'visitante' && idsConMensaje.has(u.id));
              }
              if (contactos.length === 0) {
                cont.innerHTML = '<div class="text-muted small p-3">No hay contactos disponibles</div>';
                return;
              }
              contactos.forEach(u => {
                const tieneMsg = idsConMensaje.has(u.id);
                const icon = u.rol === 'anfitrion' ? 'bi-house-door-fill' : 'bi-person-circle';
                cont.innerHTML += `
                  <div class="contact-item ${chatWithId === u.id ? 'active' : ''}" data-id="${u.id}">
                    <div class="d-flex align-items-center gap-2">
                      <span class="icon-only" style="font-size:1.2rem;"><i class="bi ${icon}"></i></span>
                      <div>
                        <div class="fw-bold">${u.nombre}</div>
                        <small class="text-muted">${u.rol}</small>
                      </div>
                    </div>
                    ${!tieneMsg ? '<span class="badge-precio" style="font-size:0.65rem;">nuevo</span>' : ''}
                  </div>`;
              });
              cont.querySelectorAll('.contact-item').forEach(btn => {
                btn.addEventListener('click', function() {
                  chatWithId = Number(this.dataset.id);
                  cargarChat();
                  document.getElementById('formMsg').style.display = 'flex';
                  cont.querySelectorAll('.contact-item').forEach(b => b.classList.remove('active'));
                  this.classList.add('active');
                  fetch('/api/messages/read', {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify({ userId: currentUserId, otroId: chatWithId })
                  });
                });
              });
              const params = new URLSearchParams(window.location.search);
              if (params.get('chat')) {
                chatWithId = Number(params.get('chat'));
                cargarChat();
                document.getElementById('formMsg').style.display = 'flex';
              }
            });
        });
    }

    function cargarChat() {
      if (!chatWithId) return;

      // Cancelar suscripción previa
      if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }

      if (window.rdpSupabase?.isConfigured) {
        const client = window.rdpSupabase.getClient();
        client.from('messages')
          .select('*, sender:profiles!sender_id(nombre), receiver:profiles!receiver_id(nombre)')
          .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${chatWithId}),and(sender_id.eq.${chatWithId},receiver_id.eq.${currentUserId})`)
          .is('deleted_at', null)
          .order('created_at', { ascending: true })
          .then(({ data }) => renderMensajes(data || []));

        // Marcar como leído
        client.from('messages')
          .update({ leido: true, leido_at: new Date().toISOString() })
          .eq('receiver_id', currentUserId)
          .eq('sender_id', chatWithId)
          .eq('leido', false);

        // Realtime: nuevos mensajes
        unsubscribeMessages = window.rdpSupabase.subscribeToMessages(currentUserId, (msg) => {
          if (msg.sender_id === chatWithId) cargarChat();
        });
        return;
      }

      fetch(`/api/messages/conversation?u1=${currentUserId}&u2=${chatWithId}`)
        .then(r => r.json())
        .then(msgs => {
          const box = document.getElementById('chatBox');
          box.innerHTML = '';
          if (msgs.length === 0) {
            box.innerHTML = '<div class="text-muted text-center" style="padding-top:3rem;">No hay mensajes aún. ¡Envía el primero!</div>';
            return;
          }
          msgs.forEach(m => {
            const esYo = m.deId === currentUserId;
            box.innerHTML += `<div class="msg-bubble ${esYo ? 'msg-out' : 'msg-in'}">
              <div>${m.texto}</div>
              <small class="text-muted" style="font-size:0.7rem;">${new Date(m.fecha).toLocaleString('es-GT')}</small>
            </div>`;
          });
          box.scrollTop = box.scrollHeight;
        });
    }

    function renderMensajes(msgs) {
      const box = document.getElementById('chatBox');
      box.innerHTML = '';
      if (msgs.length === 0) {
        box.innerHTML = '<div class="text-muted text-center" style="padding-top:3rem;">No hay mensajes aún. ¡Envía el primero!</div>';
        return;
      }
      msgs.forEach(m => {
        const esYo = m.sender_id === currentUserId;
        box.innerHTML += `<div class="msg-bubble ${esYo ? 'msg-out' : 'msg-in'}">
          <div>${m.contenido}</div>
          <small class="text-muted" style="font-size:0.7rem;">${new Date(m.created_at).toLocaleString('es-GT')}</small>
        </div>`;
      });
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById('formMsg').addEventListener('submit', function(e) {
      e.preventDefault();
      const texto = document.getElementById('textoMsg').value.trim();
      if (!texto || !chatWithId) return;

      if (window.rdpSupabase?.isConfigured) {
        window.rdpSupabase.sendMessage({
          sender_id: currentUserId,
          receiver_id: chatWithId,
          contenido: texto
        }).then(({ error }) => {
          if (error) { document.getElementById('emailStatus').innerHTML = `<span class="text-danger">Error: ${error.message}</span>`; return; }
          document.getElementById('textoMsg').value = '';
          cargarChat();
        });
        return;
      }

      fetch('/api/messages', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify({ deId: currentUserId, paraId: chatWithId, texto })
      })
      .then(r => r.json())
      .then(resp => {
        document.getElementById('textoMsg').value = '';
        cargarChat();
        if (resp.mensaje && resp.mensaje.emailEnviado) {
          document.getElementById('emailStatus').innerHTML = '<span class="text-success"><i class="bi bi-envelope-check-fill icon-inline"></i>Notificación enviada por email</span>';
        } else {
          document.getElementById('emailStatus').innerHTML = '<span class="text-muted">Email no enviado (modo demo)</span>';
        }
        setTimeout(() => document.getElementById('emailStatus').innerHTML = '', 4000);
      });
    });
  </script>
</body>
</html>
