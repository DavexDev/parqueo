<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar Parqueo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html"><i class="bi bi-p-circle-fill icon-inline"></i>Parqueos</a>
    </div>
  </nav>

  <div class="page-container">
    <h2 class="section-title"><i class="bi bi-house-add icon-inline"></i>Publicar mi parqueo</h2>
    <form id="formPublicar" class="card-parqueo p-3">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre del parqueo</label>
        <input type="text" class="form-control" id="nombre" placeholder="Ej: Parqueo La Basílica" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Tipo de vehículo</label>
        <select class="form-select" id="tipo" required>
          <option value="auto">Auto</option>
          <option value="moto">Moto</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Precio (Q)</label>
        <input type="number" class="form-control" id="precio" placeholder="Ej: 25" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Dirección</label>
        <input type="text" class="form-control" id="direccion" placeholder="Ej: 3a Calle, Zona 1" required>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label fw-semibold">Latitud</label>
          <input type="number" step="any" class="form-control" id="lat" placeholder="14.56" required>
        </div>
        <div class="col-6">
          <label class="form-label fw-semibold">Longitud</label>
          <input type="number" step="any" class="form-control" id="lng" placeholder="-89.35" required>
        </div>
      </div>
      <button type="submit" class="btn-accent"><i class="bi bi-send-check icon-inline"></i>Publicar parqueo</button>
    </form>
    <div id="estadoPublicar" class="mt-3"></div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = requireLogin(['anfitrion']);
    if (!user) throw new Error('No session');
    document.addEventListener('DOMContentLoaded', () => { renderNavbar(); renderBottomBar('publish'); });
    document.getElementById('formPublicar').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = {
        anfitrionId: user.id,
        nombre: document.getElementById('nombre').value,
        tipo: document.getElementById('tipo').value,
        precio: Number(document.getElementById('precio').value),
        direccion: document.getElementById('direccion').value,
        lat: Number(document.getElementById('lat').value),
        lng: Number(document.getElementById('lng').value)
      };
      fetch('/api/parkings', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify(data)
      })
      .then(r => r.json())
      .then(resp => {
        if (resp.success) {
          document.getElementById('estadoPublicar').innerHTML = `<div class='alert alert-success alert-parqueo'><i class="bi bi-check-circle-fill icon-inline"></i>Parqueo publicado correctamente</div>`;
        } else {
          document.getElementById('estadoPublicar').innerHTML = `<div class='alert alert-danger alert-parqueo'>Error al publicar</div>`;
        }
      });
    });
  </script>
</body>
</html>
