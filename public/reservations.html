--><!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noai, noimageai, noarchive">
  <meta name="copyright" content="© 2026 DavexDev — Todos los derechos reservados">
  <meta name="license" content="Proprietary — All Rights Reserved">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Reservas - Parqueos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html"><i class="bi bi-calendar-check-fill icon-inline"></i>Mis Reservas</a>
    </div>
  </nav>

  <div class="page-container">
    <div style="max-width:800px;margin:0 auto;">
      <div style="padding:2rem 0;">
        <h2 style="font-size:1.75rem;font-weight:700;margin-bottom:0.5rem;">Mis Reservas</h2>
        <p style="color:var(--text-muted);">Historial de tus parqueos reservados</p>
      </div>

      <div class="mb-4">
        <div class="btn-group btn-group-sm mb-3" role="group">
          <button type="button" class="btn btn-outline-primary" data-filter="todas">Todas</button>
          <button type="button" class="btn btn-outline-primary" data-filter="pendiente">Pendientes</button>
          <button type="button" class="btn btn-outline-primary" data-filter="confirmada">Confirmadas</button>
          <button type="button" class="btn btn-outline-primary" data-filter="finalizada">Finalizadas</button>
          <button type="button" class="btn btn-outline-primary" data-filter="cancelada">Canceladas</button>
        </div>
      </div>

      <div id="listaReservas">
        <div class="text-center text-muted py-5">
          <i class="bi bi-hourglass-split" style="font-size:2.5rem;margin-bottom:1rem;display:block;"></i>
          Cargando tus reservas...
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: cancelar reserva -->
  <div class="modal fade" id="modalCancelar" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:16px;overflow:hidden;">
        <div class="modal-header" style="background:var(--rdp-navy);">
          <h5 class="modal-title text-white"><i class="bi bi-x-circle icon-inline"></i>Cancelar reserva</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted mb-3">Esta acción no se puede deshacer. El parqueo quedará disponible nuevamente.</p>
          <label class="form-label fw-semibold">Motivo (opcional)</label>
          <textarea id="motivoCancelacion" class="form-control" rows="2" placeholder="Ej. Cambio de planes..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Volver</button>
          <button type="button" class="btn btn-danger" onclick="confirmarCancelacion()"><i class="bi bi-x-circle icon-inline"></i>Sí, cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="lib/supabase-client.js"></script>
  <script src="lib/push.js"></script>
  <script src="app.js"></script>
  <script>
    let todasReservas = [];
    let filtroActual = 'todas';
    let cancelarId = null;

    document.addEventListener('DOMContentLoaded', () => {
      const user = requireLogin(['visitante', 'anfitrion', 'admin']);
      if (!user) return;

      renderNavbar();
      renderBottomBar('reservas');

      if (window.rdpSupabase?.isConfigured) {
        window.rdpSupabase.autoFinalizarVencidas().catch(() => {}).then(() => cargarReservas());
      } else {
        cargarReservas();
      }

      // Event listeners para filtros
      document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          filtroActual = e.target.dataset.filter;
          renderReservas();
        });
      });

      // Activar primer botón
      document.querySelector('[data-filter="todas"]').classList.add('active');
    });

    function cargarReservas() {
      const user = getUser();
      if (window.rdpSupabase?.isConfigured) {
        window.rdpSupabase.getUserReservations(user.id)
          .then(({ data, error }) => {
            if (error) throw error;
            todasReservas = (data || []).map(r => ({
              id: r.id,
              parking_id: r.parking_id || r.parkings?.id,
              parqueoNombre: r.parkings?.nombre || 'Parqueo',
              anfitrionNombre: r.parkings?.profiles?.nombre || 'Sin especificar',
              anfitrionId: r.parkings?.anfitrion_id,
              fechaInicio: r.fecha_inicio,
              fechaFin: r.fecha_fin,
              precio: r.precio_total,
              estado: r.estado,
              tipo: r.tipo,
              codigo_reserva: r.codigo_reserva,
              metodo_pago: r.metodo_pago
            }));
            renderReservas();
          })
          .catch(() => cargarReservasExpress(user));
        return;
      }
      cargarReservasExpress(user);
    }

    function cargarReservasExpress(user) {
      fetch(`/api/reservations?usuarioId=${user.id}`, { headers: getHeaders() })
        .then(r => r.json())
        .then(reservas => {
          todasReservas = reservas || [];
          renderReservas();
        })
        .catch(e => {
          console.error('Error cargando reservas:', e);
          document.getElementById('listaReservas').innerHTML = `
            <div class="alert alert-danger" style="text-align:center;">
              <i class="bi bi-exclamation-triangle"></i> Error al cargar tus reservas. Intenta más tarde.
            </div>
          `;
        });
    }

    function renderReservas() {
      const cont = document.getElementById('listaReservas');
      let filtradas = todasReservas;

      if (filtroActual !== 'todas') {
        filtradas = todasReservas.filter(r => r.estado === filtroActual);
      }

      if (filtradas.length === 0) {
        cont.innerHTML = `
          <div style="text-align:center;padding:2rem;">
            <i class="bi bi-inbox" style="font-size:2.5rem;color:var(--text-muted);margin-bottom:1rem;display:block;"></i>
            <p style="color:var(--text-muted);">No tienes reservas en esta categoría</p>
            <a href="parkings.html" class="btn btn-primary btn-sm">Buscar parqueos</a>
          </div>
        `;
        return;
      }

      cont.innerHTML = filtradas.map(r => {
        const estadoClase = {
          'pendiente': 'warning',
          'confirmada': 'success',
          'finalizada': 'secondary',
          'cancelada': 'danger'
        }[r.estado] || 'light';

        const badgeEstado = {
          'pendiente': '<i class="bi bi-hourglass-split me-1"></i>Pendiente',
          'confirmada': '<i class="bi bi-check-circle me-1"></i>Confirmada',
          'finalizada': '<i class="bi bi-check-circle-fill me-1"></i>Finalizada',
          'cancelada': '<i class="bi bi-x-circle me-1"></i>Cancelada'
        }[r.estado] || r.estado;

        const fecha = r.fechaInicio ? new Date(r.fechaInicio).toLocaleDateString('es-GT') : 'Sin fecha';
        const fechaFin = r.fechaFin ? new Date(r.fechaFin).toLocaleDateString('es-GT') : '';
        const rango = fechaFin ? `${fecha} a ${fechaFin}` : fecha;

        return `
          <div style="
            background:var(--card-bg);
            border-left:4px solid var(--primary);
            border-radius:12px;
            padding:1.5rem;
            margin-bottom:1rem;
            transition:all var(--transition);
          " class="reserva-card">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem;">
              <div>
                <h3 style="font-size:1.1rem;font-weight:700;margin:0;margin-bottom:0.25rem;">
                  <i class="bi bi-p-circle-fill icon-inline"></i>${r.parqueoNombre || 'Parqueo'}
                </h3>
                <p style="color:var(--text-muted);font-size:0.9rem;margin:0;">
                  Anfitrión: <strong>${r.anfitrionNombre || 'Sin especificar'}</strong>
                </p>
              </div>
              <span style="
                background:${estadoClase === 'success' ? '#c8e6c9' : estadoClase === 'warning' ? '#fff9c4' : estadoClase === 'danger' ? '#ffcdd2' : '#e0e0e0'};
                color:${estadoClase === 'success' ? '#1b5e20' : estadoClase === 'warning' ? '#f57f17' : estadoClase === 'danger' ? '#b71c1c' : '#424242'};
                padding:0.5rem 1rem;
                border-radius:20px;
                font-size:0.85rem;
                font-weight:600;
              ">${badgeEstado}</span>
            </div>

            <div style="
              background:rgba(0,0,0,0.02);
              padding:1rem;
              border-radius:8px;
              margin-bottom:1rem;
              display:grid;
              grid-template-columns:1fr 1fr;
              gap:1rem;
            ">
              <div>
                <p style="font-size:0.8rem;color:var(--text-muted);margin:0 0 0.25rem 0;">Fechas</p>
                <p style="font-weight:700;margin:0;">${rango}</p>
              </div>
              <div>
                <p style="font-size:0.8rem;color:var(--text-muted);margin:0 0 0.25rem 0;">Precio</p>
                <p style="font-weight:700;margin:0;color:var(--primary);">Q${r.precio || 'N/A'}</p>
              </div>
            </div>

            <div style="display:flex;gap:0.5rem;">
              <button class="btn btn-outline-primary btn-sm" onclick="verDetalles('${r.id}')">
                <i class="bi bi-eye"></i> Detalles
              </button>
${puedeCancel(r) ? `
              <button class="btn btn-outline-danger btn-sm" onclick="iniciarCancelacion('${r.id}')">
                <i class="bi bi-x-circle"></i> Cancelar
              </button>` : (r.estado==='pendiente'||r.estado==='confirmada') ? `
              <button class="btn btn-outline-danger btn-sm" disabled title="Ya no puedes cancelar esta reserva (ya inició)">
                <i class="bi bi-x-circle"></i> Cancelar
              </button>` : ''}
              ${r.estado === 'confirmada' ? `
                <button class="btn btn-outline-info btn-sm" onclick="contactarAnfitrion('${r.anfitrionId}')">
                  <i class="bi bi-chat-dots"></i> Contactar
                </button>` : r.estado === 'pendiente' ? `
                <button class="btn btn-outline-secondary btn-sm" disabled title="Disponible cuando el anfitrion acepte la reserva">
                  <i class="bi bi-chat-dots"></i> Contactar
                </button>` : ''}
              ${r.estado === 'finalizada' ? `
                <a href="reviews.html?id=${r.parking_id}&reserva=${r.id}" class="btn btn-outline-warning btn-sm">
                  <i class="bi bi-star"></i> Reseñar
                </a>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function verDetalles(reservaId) {
      const r = todasReservas.find(x => x.id == reservaId);
      if (!r) return;

      const estadoColor = { confirmada:'#16a34a', pendiente:'#d97706', finalizada:'#0F172A', cancelada:'#dc2626' }[r.estado] || '#64748b';
      const estadoBg    = { confirmada:'#f0fdf4', pendiente:'#fffbeb', finalizada:'#f8fafc',  cancelada:'#fef2f2' }[r.estado] || '#f1f5f9';
      const estadoIcon  = { confirmada:'bi-check-circle-fill', pendiente:'bi-hourglass-split', finalizada:'bi-check-circle-fill', cancelada:'bi-x-circle-fill' }[r.estado] || 'bi-circle';
      const estadoLabel = { confirmada:'Confirmada', pendiente:'Pendiente', finalizada:'Finalizada', cancelada:'Cancelada' }[r.estado] || r.estado;

      const fmtFull = d => d ? new Date(d).toLocaleString('es-GT', { dateStyle:'long', timeStyle:'short' }) : '—';
      const metodoLabel = { online:'En línea', llegada:'Al llegar', anticipo:'Con anticipo' }[r.metodoPago] || (r.metodoPago || '—');
      const codigo = r.codigoReserva || r.codigo_reserva || r.id?.toString().slice(-8).toUpperCase() || '—';

      const modalEl = document.createElement('div');
      modalEl.innerHTML = `
        <div class="modal fade" tabindex="-1">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:18px;overflow:hidden;">
              <div class="modal-header" style="background:#0F172A;padding:1.1rem 1.25rem;">
                <div>
                  <div style="font-size:.72rem;color:#D4AF37;text-transform:uppercase;letter-spacing:.08em;font-weight:700;">Reserva</div>
                  <h5 class="modal-title text-white mb-0" style="font-size:1rem;font-weight:700;">${esc(r.parqueoNombre || 'Parqueo')}</h5>
                </div>
                <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body" style="padding:1.25rem;">

                <!-- Estado + Código -->
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;">
                  <span style="display:inline-flex;align-items:center;gap:.4rem;background:${estadoBg};color:${estadoColor};padding:.4rem .9rem;border-radius:20px;font-size:.82rem;font-weight:700;">
                    <i class="bi ${estadoIcon}"></i>${estadoLabel}
                  </span>
                  <span style="font-size:.75rem;color:#64748b;">Código: <strong style="color:#0F172A;font-family:monospace;">${esc(codigo)}</strong></span>
                </div>

                <!-- Filas de datos -->
                <div style="display:flex;flex-direction:column;gap:.6rem;">
                  <div style="display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;background:#f8fafc;border-radius:10px;">
                    <i class="bi bi-p-circle-fill" style="color:#D4AF37;font-size:1.1rem;flex-shrink:0;"></i>
                    <div><div style="font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;">Parqueo</div><div style="font-weight:600;font-size:.88rem;">${esc(r.parqueoNombre||'—')}</div></div>
                  </div>
                  <div style="display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;background:#f8fafc;border-radius:10px;">
                    <i class="bi bi-person-circle" style="color:#0F172A;font-size:1.1rem;flex-shrink:0;"></i>
                    <div><div style="font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;">Anfitrión</div><div style="font-weight:600;font-size:.88rem;">${esc(r.anfitrionNombre||'—')}</div></div>
                  </div>
                  <div style="display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;background:#f8fafc;border-radius:10px;">
                    <i class="bi bi-calendar-event" style="color:#0F172A;font-size:1.1rem;flex-shrink:0;"></i>
                    <div><div style="font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;">Inicio</div><div style="font-weight:600;font-size:.88rem;">${fmtFull(r.fechaInicio)}</div></div>
                  </div>
                  <div style="display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;background:#f8fafc;border-radius:10px;">
                    <i class="bi bi-calendar-check" style="color:#0F172A;font-size:1.1rem;flex-shrink:0;"></i>
                    <div><div style="font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;">Fin</div><div style="font-weight:600;font-size:.88rem;">${fmtFull(r.fechaFin)}</div></div>
                  </div>
                  <div style="display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;background:#f8fafc;border-radius:10px;">
                    <i class="bi bi-credit-card" style="color:#0F172A;font-size:1.1rem;flex-shrink:0;"></i>
                    <div><div style="font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;">Método de pago</div><div style="font-weight:600;font-size:.88rem;">${esc(metodoLabel)}</div></div>
                  </div>
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding:.8rem .85rem;background:#0F172A;border-radius:10px;">
                    <span style="color:#D4AF37;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;">Total</span>
                    <span style="color:#fff;font-size:1.3rem;font-weight:800;">Q${r.precio||r.precio_total||0}</span>
                  </div>
                </div>
              </div>
              <div class="modal-footer" style="border:none;padding:.75rem 1.25rem 1.1rem;">
                <button type="button" class="btn-main" style="width:100%;" data-bs-dismiss="modal">Cerrar</button>
              </div>
            </div>
          </div>
        </div>`;

      document.body.appendChild(modalEl);
      const m = new bootstrap.Modal(modalEl.querySelector('.modal'));
      m.show();
      modalEl.addEventListener('hidden.bs.modal', () => modalEl.remove());
    }

    function puedeCancel(r) {
      if (r.estado !== 'pendiente' && r.estado !== 'confirmada') return false;
      const ahora = new Date();
      const inicio = r.fechaInicio ? new Date(r.fechaInicio) : null;
      // Puede cancelar si la reserva aún no ha iniciado
      return inicio && inicio > ahora;
    }

    function iniciarCancelacion(reservaId) {
      cancelarId = reservaId;
      document.getElementById('motivoCancelacion').value = '';
      new bootstrap.Modal(document.getElementById('modalCancelar')).show();
    }

    async function confirmarCancelacion() {
      if (!cancelarId) return;
      const user = getUser();
      const motivo = document.getElementById('motivoCancelacion').value.trim();
      bootstrap.Modal.getInstance(document.getElementById('modalCancelar')).hide();
      const { error } = await window.rdpSupabase.updateReservationStatus(cancelarId, 'cancelada', {
        cancelada_at: new Date().toISOString(),
        cancelada_por: user.id,
        ...(motivo ? { motivo_cancelacion: motivo } : {})
      });
      cancelarId = null;
      if (error) { rdpAlert('No se pudo cancelar la reserva. Intenta nuevamente.', 'error'); return; }
      cargarReservas();
    }

    function contactarAnfitrion(anfitrionId) {
      window.location.href = `messages.html?chat=${anfitrionId}`;
    }
  </script>
</body>
</html>
