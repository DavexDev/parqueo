<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parqueos Esquipulas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1565c0">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html">🅿️ Parqueos</a>
    </div>
  </nav>

  <div class="page-container">
    <div class="home-hero">
      <div class="hero-icon">🅿️</div>
      <h1>Encuentra tu parqueo en Esquipulas</h1>
      <p>Reserva tu espacio antes de llegar. Rápido, seguro y sin estrés.</p>
    </div>
    <div id="botonesNav" class="d-flex flex-column gap-075"></div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderBottomBar('home');
      const user = getUser();
      const cont = document.getElementById('botonesNav');
      if (!user) {
        cont.innerHTML = `
          <a href="parkings.html" class="btn-main">🔍 Buscar parqueo</a>
          <a href="login.html" class="btn-ghost">👤 Iniciar sesión / Registrarse</a>
        `;
      } else if (user.rol === 'visitante') {
        cont.innerHTML = `
          <a href="parkings.html" class="btn-main">🔍 Buscar parqueo</a>
          <a href="messages.html" class="btn-ghost">💬 Mensajes</a>
        `;
      } else if (user.rol === 'anfitrion') {
        cont.innerHTML = `
          <a href="publish.html" class="btn-accent">➕ Publicar mi parqueo</a>
          <a href="messages.html" class="btn-main">💬 Mensajes</a>
          <a href="parkings.html" class="btn-ghost">🔍 Ver parqueos</a>
        `;
      } else if (user.rol === 'admin') {
        cont.innerHTML = `
          <a href="admin.html" class="btn-dark-custom">⚙️ Panel Admin</a>
          <a href="parkings.html" class="btn-main">🔍 Ver parqueos</a>
          <a href="metrics.html" class="btn-ghost">📊 Métricas</a>
        `;
      }
    });
  </script>
</body>
</html>
