<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RDP S.A. — Parqueos Esquipulas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0F172A">
  <meta name="description" content="Reserva parqueos en Esquipulas, Guatemala. Rápido, seguro y sin estrés.">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <div class="navbar-brand-logo">R</div>
        RDP S.A.
      </a>
      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-light btn-sm" title="Modo oscuro" onclick="toggleDarkMode()">
          <i class="bi bi-moon-stars"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="page-container">
    <div class="home-hero">
      <div class="hero-icon"><i class="bi bi-p-circle-fill"></i></div>
      <div class="hero-tagline">Esquipulas, Guatemala</div>
      <h1>Tu parqueo seguro en Esquipulas</h1>
      <p>Reserva antes de llegar. Sin sorpresas, sin vueltas enústicas.</p>
    </div>

    <!-- Stats rápidos (visibles sin login) -->
    <div class="row g-2 mb-3" id="statsRow"></div>

    <!-- Botones de navegación por rol -->
    <div id="botonesNav" class="d-flex flex-column gap-075"></div>

    <!-- Parqueos destacados -->
    <div id="featuredSection" class="mt-3"></div>

    <!-- Tutorial link -->
    <div class="text-center mt-3" style="padding-top:1rem;border-top:1px solid var(--border);">
      <a href="tutorial.html" class="btn btn-sm btn-outline-secondary" style="border-radius:20px;font-size:0.82rem;">
        <i class="bi bi-book-fill"></i> Cómo funciona RDP
      </a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNavbar();
      renderBottomBar('home');
      const user = getUser();
      const cont = document.getElementById('botonesNav');

      // Botones por rol
      if (!user) {
        cont.innerHTML = `
          <a href="parkings.html" class="btn-gold"><i class="bi bi-search icon-inline"></i>Buscar parqueo</a>
          <a href="login.html" class="btn-ghost"><i class="bi bi-person-circle icon-inline"></i>Iniciar sesión / Registrarse</a>
        `;
      } else if (user.rol === 'visitante') {
        cont.innerHTML = `
          <a href="parkings.html" class="btn-gold"><i class="bi bi-search icon-inline"></i>Buscar parqueo</a>
          <a href="reservations.html" class="btn-main"><i class="bi bi-calendar-check icon-inline"></i>Mis reservas</a>
          <a href="messages.html" class="btn-ghost"><i class="bi bi-chat-dots icon-inline"></i>Mensajes</a>
        `;
      } else if (user.rol === 'anfitrion') {
        cont.innerHTML = `
          <a href="publish.html" class="btn-gold"><i class="bi bi-plus-circle-fill icon-inline"></i>Publicar mi parqueo</a>
          <a href="host-dashboard.html" class="btn-main"><i class="bi bi-shop-fill icon-inline"></i>Mi negocio</a>
          <a href="messages.html" class="btn-ghost"><i class="bi bi-chat-dots icon-inline"></i>Mensajes</a>
        `;
      } else if (user.rol === 'admin') {
        cont.innerHTML = `
          <a href="admin.html" class="btn-gold"><i class="bi bi-sliders icon-inline"></i>Panel Admin</a>
          <a href="metrics.html" class="btn-main"><i class="bi bi-bar-chart-line icon-inline"></i>Métricas</a>
          <a href="parkings.html" class="btn-ghost"><i class="bi bi-search icon-inline"></i>Ver parqueos</a>
        `;
      }

      // Stats rápidos desde API
      fetch('/api/stats')
        .then(r => r.json())
        .then(d => {
          if (!d.success) return;
          const s = d.stats || {};
          document.getElementById('statsRow').innerHTML = `
            <div class="col-4">
              <div class="stat-card-new blue text-center">
                <div class="stat-number">${s.totalParqueos || '—'}</div>
                <div class="stat-label">Parqueos</div>
              </div>
            </div>
            <div class="col-4">
              <div class="stat-card-new gold text-center">
                <div class="stat-number">${s.totalReservas || '—'}</div>
                <div class="stat-label">Reservas</div>
              </div>
            </div>
            <div class="col-4">
              <div class="stat-card-new green text-center">
                <div class="stat-number">${s.disponibles || '—'}</div>
                <div class="stat-label">Disponibles</div>
              </div>
            </div>
          `;
        })
        .catch(() => {});
    });
  </script>
</body>
</html>
