<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reseñas - Parqueos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    .review-card { 
      background: var(--card-bg); 
      border-radius: 12px; 
      padding: 1.5rem; 
      margin-bottom: 1rem; 
      border-left: 4px solid var(--primary);
    }
    .review-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; }
    .review-author { font-weight: 700; font-size: 1rem; }
    .review-rating { 
      color: #ffc107; 
      font-size: 0.95rem; 
      font-weight: 600;
    }
    .review-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
    .review-text { color: var(--text); font-size: 0.95rem; line-height: 1.5; }
    .rating-input { font-size: 2rem; cursor: pointer; }
    .rating-input .star { 
      color: #ddd; 
      margin-right: 0.25rem; 
      transition: all 0.2s;
    }
    .rating-input .star:hover,
    .rating-input .star.active { 
      color: #ffc107; 
      transform: scale(1.2);
    }
    .stats-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
      gap: 1rem; 
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card-bg);
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
      border-top: 3px solid var(--primary);
    }
    .stat-number { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
    .review-form { background: var(--card-bg); padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
    .form-section { margin-bottom: 1.5rem; }
    .form-section label { font-weight: 600; margin-bottom: 0.5rem; display: block; }
    .textarea-counter { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html"><i class="bi bi-star-fill icon-inline"></i>Reseñas</a>
    </div>
  </nav>

  <div class="page-container" style="max-width:700px;">
    <!-- Header -->
    <div style="margin-bottom:2rem;">
      <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem;">
        <i class="bi bi-p-circle-fill"></i>
        <span id="parkingName">Parqueo</span>
      </h1>
      <div style="display:flex;align-items:center;gap:1rem;color:var(--text-muted);font-size:0.9rem;">
        <span id="parkingRating">
          <i class="bi bi-star-fill" style="color:#ffc107;"></i>
          <strong>4.5</strong>
        </span>
        <span id="reviewCount">12 reseñas</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number">4.5</div>
        <div class="stat-label">Calificación</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">12</div>
        <div class="stat-label">Total reseñas</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">95%</div>
        <div class="stat-label">Recomendado</div>
      </div>
    </div>

    <!-- Formulario para escribir reseña -->
    <div class="review-form">
      <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:1.5rem;">Escribe tu reseña</h3>
      
      <div class="form-section">
        <label>¿Qué tan buena fue tu experiencia?</label>
        <div class="rating-input" id="ratingInput">
          <span class="star" data-value="1" onclick="selectRating(1)">★</span>
          <span class="star" data-value="2" onclick="selectRating(2)">★</span>
          <span class="star" data-value="3" onclick="selectRating(3)">★</span>
          <span class="star" data-value="4" onclick="selectRating(4)">★</span>
          <span class="star" data-value="5" onclick="selectRating(5)">★</span>
        </div>
        <p style="font-size:0.85rem;color:var(--text-muted);margin-top:0.5rem;display:none;" id="ratingText"></p>
      </div>

      <div class="form-section">
        <label for="reviewText">Tu comentario (opcional)</label>
        <textarea class="form-control" id="reviewText" rows="4" placeholder="Cuéntanos tu experiencia..." maxlength="500" onchange="updateCounter()"></textarea>
        <div class="textarea-counter">
          <span id="charCount">0</span>/500 caracteres
        </div>
      </div>

      <div class="form-section">
        <label style="display:flex;align-items:center;gap:0.5rem;font-weight:normal;cursor:pointer;">
          <input type="checkbox" id="recommend" checked>
          <span>Recomiendo este parqueo</span>
        </label>
      </div>

      <button class="btn btn-primary" style="width:100%;" onclick="enviarReseña()">
        <i class="bi bi-send"></i> Enviar Reseña
      </button>
    </div>

    <!-- Reseñas -->
    <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:1rem;">Todas las reseñas</h3>
    <div id="reviewsList">
      <div class="text-center text-muted py-3">Cargando reseñas...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
  <script src="lib/supabase-client.js"></script>
  <script>
    let ratingSeleccionado = 0;
    let parkingId = null;
    let reservaId = null;

    document.addEventListener('DOMContentLoaded', () => {
      requireLogin();
      renderNavbar();
      renderBottomBar('reviews');

      const params = new URLSearchParams(window.location.search);
      parkingId = params.get('id');
      reservaId = params.get('reserva') || null;

      if (!parkingId) {
        document.querySelector('.page-container').innerHTML = '<div class="alert alert-warning">No se especificó el parqueo. <a href="parkings.html">Volver al listado</a></div>';
        return;
      }

      cargarParqueo(parkingId);
      cargarReseñas(parkingId);

      // Ocultar formulario si no viene de una reserva
      if (!reservaId) {
        document.querySelector('.review-form').innerHTML = '<div class="alert alert-info"><i class="bi bi-info-circle icon-inline"></i>Solo puedes reseñar parqueos donde hayas tenido una reserva finalizada. <a href="reservations.html">Ver mis reservas</a></div>';
      }
    });

    function cargarParqueo(id) {
      if (window.rdpSupabase?.isConfigured) {
        window.rdpSupabase.getParkingById(id)
          .then(({ data, error }) => {
            if (data) {
              document.getElementById('parkingName').textContent = data.nombre || 'Parqueo';
            }
          });
        return;
      }
      fetch(`/api/parkings/${id}`)
        .then(r => r.json())
        .then(p => { document.getElementById('parkingName').textContent = p.nombre || 'Parqueo'; })
        .catch(() => {});
    }

    function cargarReseñas(id) {
      if (!window.rdpSupabase?.isConfigured) {
        document.getElementById('reviewsList').innerHTML = generarReseñasMock();
        return;
      }
      window.rdpSupabase.getParkingRatings(id)
        .then(({ data, error }) => {
          const cont = document.getElementById('reviewsList');
          if (error || !data || data.length === 0) {
            cont.innerHTML = '<div class="text-center text-muted py-3"><i class="bi bi-star" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>Aún no hay reseñas. ¡Sé el primero!</div>';
            return;
          }
          // Actualizar stats
          const promedio = (data.reduce((s, r) => s + r.estrellas, 0) / data.length).toFixed(1);
          const recomendados = data.filter(r => r.estrellas >= 4).length;
          const pct = Math.round(recomendados / data.length * 100);
          document.getElementById('parkingRating').innerHTML = `<i class="bi bi-star-fill" style="color:#ffc107;"></i> <strong>${promedio}</strong>`;
          document.getElementById('reviewCount').textContent = `${data.length} reseñas`;
          document.querySelectorAll('.stat-number')[0].textContent = promedio;
          document.querySelectorAll('.stat-number')[1].textContent = data.length;
          document.querySelectorAll('.stat-number')[2].textContent = pct + '%';

          cont.innerHTML = data.map(r => `
            <div class="review-card">
              <div class="review-header">
                <div>
                  <div class="review-author"><i class="bi bi-person-circle"></i> ${r.profiles?.nombre || 'Usuario'}</div>
                  <div class="review-meta">${new Date(r.created_at).toLocaleDateString('es-GT')}</div>
                </div>
                <div class="review-rating">${'★'.repeat(r.estrellas)}${'☆'.repeat(5 - r.estrellas)}</div>
              </div>
              ${r.comentario ? `<p class="review-text">${r.comentario}</p>` : ''}
            </div>
          `).join('');
        });
    }

    function selectRating(valor) {
      ratingSeleccionado = valor;
      updateRatingStars(valor);
      
      const textos = {
        1: 'Muy malo',
        2: 'Malo',
        3: 'Normal',
        4: 'Bueno',
        5: 'Excelente'
      };
      document.getElementById('ratingText').textContent = textos[valor];
      document.getElementById('ratingText').style.display = 'block';
    }

    function updateRatingStars(valor) {
      document.querySelectorAll('#ratingInput .star').forEach((star, idx) => {
        if (idx < valor) {
          star.classList.add('active');
        } else {
          star.classList.remove('active');
        }
      });
    }

    function updateCounter() {
      const count = document.getElementById('reviewText').value.length;
      document.getElementById('charCount').textContent = count;
    }

    function enviarReseña() {
      if (ratingSeleccionado === 0) {
        alert('Por favor selecciona una calificación');
        return;
      }

      const comentario = document.getElementById('reviewText').value.trim();
      const user = getUser();

      if (window.rdpSupabase?.isConfigured) {
        if (!reservaId) {
          alert('Solo puedes reseñar parqueos donde hayas tenido una reserva finalizada.');
          return;
        }
        window.rdpSupabase.createRating({
          reserva_id: reservaId,
          parking_id: parkingId,
          usuario_id: user.id,
          estrellas: ratingSeleccionado,
          comentario: comentario || null
        }).then(({ data, error }) => {
          if (error) {
            if (error.code === '42501') {
              alert('Solo puedes reseñar parqueos con reserva finalizada.');
            } else {
              alert('Error al enviar: ' + error.message);
            }
            return;
          }
          alert('✓ ¡Gracias por tu reseña!');
          document.querySelector('.review-form').innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle icon-inline"></i>Reseña enviada. ¡Gracias por tu opinión!</div>';
          cargarReseñas(parkingId);
        });
        return;
      }

      // Fallback: mostrar mensaje de demo
      alert('✓ ¡Gracias por tu reseña! (modo demo)');
      location.reload();
    }

    function generarReseñasMock() {
      const reviews = [
        { author: 'Juan Morales', rating: 5, text: 'Excelente ubicación, muy seguro. El anfitrión respondió rápido.', date: '2 de enero' },
        { author: 'María García', rating: 4, text: 'Buen parqueo pero un poco estrecho para autos grandes.', date: '28 de diciembre' },
        { author: 'Pedro López', rating: 5, text: 'Perfecto para visitar la Basílica, recomendado.', date: '20 de diciembre' }
      ];
      return reviews.map(r => `
        <div class="review-card">
          <div class="review-header">
            <div>
              <div class="review-author"><i class="bi bi-person-circle"></i> ${r.author}</div>
              <div class="review-meta">${r.date}</div>
            </div>
            <div class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
          </div>
          <p class="review-text">${r.text}</p>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
