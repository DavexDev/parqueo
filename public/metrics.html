<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Métricas del Sistema</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-parqueo">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="index.html">🅿️ Parqueos</a>
    </div>
  </nav>

  <div class="page-container">
    <h2 class="section-title">📊 Métricas clave</h2>
    <p class="text-muted text-center mb-4" style="font-size:0.9rem;">Datos de demostración del sistema</p>
    <div class="row g-3" id="metricas"></div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { renderNavbar(); renderBottomBar('metrics'); });
    fetch('/api/metrics')
      .then(r => r.json())
      .then(m => {
        document.getElementById('metricas').innerHTML = `
          <div class="col-6">
            <div class="stat-card-new" style="border-left:4px solid var(--primary);">
              <div class="stat-value">${m.parqueos}</div>
              <div class="stat-label">🅿️ Parqueos registrados</div>
            </div>
          </div>
          <div class="col-6">
            <div class="stat-card-new" style="border-left:4px solid var(--accent);">
              <div class="stat-value">${m.reservas}</div>
              <div class="stat-label">📅 Reservas realizadas</div>
            </div>
          </div>
          <div class="col-6">
            <div class="stat-card-new" style="border-left:4px solid #ff9800;">
              <div class="stat-value">${m.ocupacion}%</div>
              <div class="stat-label">📈 Ocupación</div>
            </div>
          </div>
          <div class="col-6">
            <div class="stat-card-new" style="border-left:4px solid #9c27b0;">
              <div class="stat-value">${m.tiempoBusqueda} min</div>
              <div class="stat-label">⏱️ Tiempo búsqueda</div>
            </div>
          </div>
        `;
      });
  </script>
</body>
</html>
